ivation\r\n\r\nThe part of closed PR https://github.com/sgl-project/sglang/pull/11984. \r\nAdding weight conversion from ND to FRACTAL_NZ speeds up the GroupedMatmul kernel\r\n\r\n## Modifications\r\n\r\n1. Add NZ conversion for non-quantized MOE models (11% speedup an average), update NZ documentaion\r\n2. Move transpose(1,2) from forward_npu() to process_weights_after_loading()\r\n3. Fix double memory consumption bug for Qwen MOE models on ascend, remove old workaround\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n### NZ acceleration:\r\n<img width=\"872\" height=\"79\" alt=\"image\" src=\"https://github.com/user-attachments/assets/ef93382a-0ffd-4250-b806-798280d0f06f\" />\r\n\r\n## Benchmarking and Profiling\r\n\r\n### NZ acceleration:\r\n\r\n#### Server:\r\n`python -m sglang.launch_server     --model-path ./Qwen3-30B-A3B      --port 30088     --trust-remote-code     --tp-size 4     --mem-fraction-static 0.8     --attention-backend ascend     --device npu     --quantization modelslim       --base-gpu-id 0     --cuda-graph-bs 64     --disable-radix-cache`\r\n\r\n#### Client:\r\n`python -m sglang.bench_serving --backend sglang --random-range-ratio 1.0 --dataset-path /data/data/ShareGPT_Vicuna_unfiltered/ShareGPT_V3_unfiltered_cleaned_split.json --dataset-name random --flush-cache --num-prompts * --max-concurrency * --random-input-len * --random-output-len *  --host 127.0.0.1 --port 30088`\r\n\r\n<img width=\"654\" height=\"583\" alt=\"image\" src=\"https://github.com/user-attachments/assets/b7c154b5-4ea5-451b-8537-21d88b24b38b\" />\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/develope", "pr_labels": ["documentation", "quant", "deepseek", "npu", "run-ci"], "files_fixed": ["docs/platforms/ascend_npu_deepseek_example.md", "docs/platforms/ascend_npu_qwen3_examples.md", "python/sglang/srt/hardware_backend/npu/quantization/fused_moe_method_npu.py", "python/sglang/srt/layers/moe/ep_moe/layer.py", "python/sglang/srt/layers/quantization/unquant.py", "python/sglang/srt/models/qwen3_moe.py", "test/registered/ascend/test_ascend_memory_consumption.py"], "commit_sha": "b77b0ffd60", "date_fixed": "2026-01-28T16:55:09Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-069", "title": "fix gpt-oss launch failure with piecewise cuda graph", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "NPU support code causes gpt-oss launch failure with piecewise CUDA graph: traceback shows crash in fused_moe_triton mxfp4 quantization path", "rationale": "One-line fix for gpt-oss launch crash when piecewise CUDA graph is enabled on NPU. Traceback shows crash propagating through fused_moe_triton/layer.py -> mxfp4.py -> moe_runner. Root cause made more specific with traceback context. Rationale internally inconsistent (mentioned severity 2 but field is 3) — corrected.", "pr_number": 17532, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/17532", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\nrecent NPU support introduced a small bug which make the gpt-oss fail to launch with piecewise cuda graph.\r\nThis one line change is to fix the bug\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Accuracy Tests\r\n`python3 -m sglang.launch_server --model-path /shared/public/elr-models/openai/gpt-oss-120b-new/ --trust-remote-code --tp 4 --reasoning-parser gpt-oss --enable-piecewise-cuda-graph`\r\n\r\nBefore:\r\n```\r\n    combine_input = self.run_moe_core(\r\n  File \"/home/jobuser/zminglei/sglang/python/sglang/srt/layers/moe/fused_moe_triton/layer.py\", line 980, in run_moe_core\r\n    return self.quant_method.apply(\r\n  File \"/home/jobuser/zminglei/sglang/python/sglang/srt/layers/quantization/mxfp4.py\", line 716, in apply\r\n    return self.runner.run(dispatch_output, quant_info)\r\n  File \"/home/jobuser/zminglei/sglang/python/sglang/srt/layers/moe/moe_runner/runner.py\", line 78, in run\r\n    return self.fused_func(dispatch_output, quant_info, self.config)\r\n  File \"/home/jobuser/zminglei/sglang/python/sglang/srt/layers/moe/moe_runner/triton.py\", line 339, in fused_experts_none_to_triton\r\n    output = fused_experts(\r\n  File \"/home/jobuser/zminglei/sglang/python/sglang/srt/layers/moe/fused_moe_triton/fused_moe.py\", line 213, in fused_experts\r\n    inplace_fused_experts(\r\n  File \"/home/jobuser/zminglei/sglang/venv/lib/python3.10/site-packages/torch/_ops.py\", line 1255, in __call__\r\n    return self._op(*args, **kwargs)\r\n  File \"/home/jobuser/zminglei/sglang/python/sglang/srt/layers/moe/fused_moe_triton/fused_moe.py\", line 91, in inplace_fused_experts\r\n    fused_experts_impl(\r\n  File \"/home/jobuser/zminglei/sglang/python/sgl", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/models/gpt_oss.py"], "commit_sha": "2b2f317383", "date_fixed": "2026-01-23T06:41:38Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-070", "title": "[NPU]bugfix: fix for dsv3.2 and dsvl2", "category": "precision_loss", "severity": 3, "confidence": 0.95, "root_cause": "DS-VL2 rotary_embedding bug, DSV32 alt_stream compatibility, and YARN RoPE detection produce wrong RoPE values for attention", "rationale": "Description explicitly states 'Wrong RoPE values silently produce incorrect attention output'. Category silent_corruption with severity 4 per rule 2.", "pr_number": 17007, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/17007", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n1、There are some bugs for DS-Vl2 on rotary_embedding\r\n2、DSV32 is not compatible with the scenario where m.alt_stream is not None.\r\n\r\n## Modifications\r\n\r\n1、Fix the ds-v12 rotary_embedding bug and add a branch to the RotaryEmebedding class.\r\n2、The fix ds-v32 is compatible with the scenario where m.alt_stream is empty.\r\n\r\n## Accuracy Tests\r\n\r\nBoth (dsvl2/dsv3.2) models are covered by CI\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review Process\r\n\r\n1. Ping Merge Oncalls to start the PR flow. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/ ng/pulls/22778", "pr_body": "Fixed an intermittent issue where the execution exceeded the pre-allocated graph range in NPU Graph Mode.\r\n\r\n<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\nWhen Graph Mode is enabled with the --speculative-num-draft-tokens parameter on NPU, an exception is intermittently thrown when the output token length reaches the system's maximum context length. The error indicates a mismatch between the tensor size to be copied and the size pre-allocated during graph initialization.\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\n## Modifications\r\nWhen initializing the memory space for the block_tables and block_tables_swa fields in graph_metadata, factor in the --speculative-num-draft-tokens argument.\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Accuracy Tests\r\nExcluding accuracy and performance testing, the objective is to construct a scenario that exceeds the pre-allocated graph memory size. The request successfully returns and completes execution without causing any program crashes or exceptions. \r\n<img width=\"574\" height=\"107\" alt=\"8fb91a75-18b3-462e-b8f6-e5d24d0f5ba1\" src=\"https://github.com/user-attachments/assets/fa8900cf-e57b-469f-93e7-abf6078dcfde\" />\r\n```\r\nSetup and Curl command:\r\n\r\nsglang serve --model-path /home/weights/Qwen/QwQ-32B --trust-remote-code --attention-backend ascend --speculative-algorithm NGRAM --speculative-num-draft-tokens 16 --mem-fraction-static 0.95 --disable-radix-cache --base-gpu-id 12 --speculative-ngram-max-trie-depth 18 --device npu --host 127.0.0.1 --port 23450 --cuda-graph-bs 1 8 16 24 --context-length 32768 --tool-call-parser qwen25 --tp-size 2\r\n\r\ncurl -s http://127.0.0.1:23450/v1/chat/completions \\\r\n  -H \"Content-Type: application/json\" \\\r\n  -d '{\r\n    \"model\": \"QwQ-32B\",\r\n   ", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/attention/ascend_backend.py"], "commit_sha": "80125febb1", "date_fixed": "2026-04-23T17:23:36Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-077", "title": "[Bugfix] [NPU] Fix check_env on Ascend for CANN 8.5", "category": "compatibility", "severity": 1, "confidence": 0.95, "root_cause": "check_env fails on CANN 8.5 due to changed bisheng compiler path, no fallback for older paths", "rationale": "Environment check utility fails on newer CANN version. Fix adds fallback to old path for backwards compatibility.", "pr_number": 22888, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/22888", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nFix problem of\r\npython3 -m sglang.check_env\r\nwith CANN 8.5\r\n\r\nFix issue - #22843 \r\n\r\n## Modifications\r\n\r\nChange path to Bisheng compiler bin in check_env.py\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Speed Tests and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review and Merge Process\r\n\r\n1. Ping Merge Oncalls to start the process. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/sglang/blob/main/.github/CODEOWNERS) and other reviewers.\r\n3. Trigger CI tests with [comments](https://do", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/check_env.py"], "commit_sha": "ba850d3a9d", "date_fixed": "2026-04-17T01:05:21Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-078", "title": "[Fix] eagle/eagle3 speculative decoding conflicts with xgrammar in NPU", "category": "precision_loss", "severity": 3, "confidence": 0.95, "root_cause": "NPU's apply_token_bitmask_inplace_triton fails to enforce XGrammar token masks for Eagle/Eagle3 speculative decoding on Ascend NPU, allowing masked tokens to retain high logits and be selected", "rationale": "Eagle/Eagle3 speculative decoding with xgrammar on NPU produces wrong tokens because Triton bitmask kernel doesn't enforce token masks on NPU. Current root_cause 'token_routing' is too vague. PR body describes wrong token selection (grammar constraint violations), not primarily a crash. Category precision_loss correct, severity 4 correct.", "pr_number": 20989, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/20989", "pr_body": "## Motivation\r\n\r\nFix when turn on the eagle/eagle3 spec-decoding and send a request with json_schema, as reported in [#20148](https://github.com/sgl-project/sglang/issues/20148).\r\nThe reason is that , on Ascend NPU, apply_token_bitmask_inplace_triton can fail to enforce grammar masks for XGrammar-constrained decoding: tokens that are masked out (mask_allows=False) may still keep high logits and be selected, causing downstream Tokens not accepted errors in grammar.accept_token.\r\n\r\nThis PR supersedes a previously closed PR (#20168),\r\nwhich was accidentally invalidated due to a force push.\r\n\r\nThis version reintroduces the changes on a clean branch.\r\n\r\n## Modifications\r\n\r\nThis PR adds an NPU-safe fallback for constrained mask application:\r\n\r\nFor logits.device.type == \"npu\" in XGrammar, use a CPU-based bitmask unpack + NPU masked_fill(-inf) path.\r\nKeep existing Triton/CUDA paths unchanged for non-NPU devices.\r\nMove the NPU fallback helper into triton_ops/bitmask_ops.py for centralized mask-op management.\r\n\r\n## Accuracy Tests\r\nserver responses correctly and the response keeps consistent with the case where eagle is turned off.\r\n\r\n<img width=\"1923\" height=\"94\" alt=\"02d99b3d08ee824b9a451f032314c196\" src=\"https://github.com/user-attachments/assets/9b40f32f-1090-4033-8a7d-cc5697e96f1b\" />\r\n\r\n\r\n## Benchmarking and Profiling\r\n<img width=\"1148\" height=\"210\" alt=\"1d8fb94bc89737a4df7b047789223973\" src=\"https://github.com/user-attachments/assets/0db604da-44ca-45dd-a5e3-2374b72e5ccd\" />\r\n\r\n\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [x] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [x] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [x] Provide ac", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/constrained/torch_ops/bitmask_ops.py", "python/sglang/srt/constrained/xgrammar_backend.py", "python/sglang/test/ascend/test_ascend_vocab_mask.py"], "commit_sha": "65bc839a5f", "date_fixed": "2026-04-16T06:34:24Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-082", "title": "[Bugfix] [NPU] Qwen3.5 with quantization fix", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "incorrect packed_module_mapping for fused in_proj_qkvz and in_proj_ba layers after Qwen3.5 model refactoring, causing RuntimeError during quantized weight loading", "rationale": "Qwen3.5 model refactoring fused separate in_proj layers into in_proj_qkvz and in_proj_ba, but the quantization packed_module_mapping was not updated for the new fused module names, causing weight loading to fail. The fix adds correct mapping entries and refactors get_linear_scheme() for maintainability.", "pr_number": 21692, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/21692", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nFix of https://github.com/sgl-project/sglang/issues/21676.\r\n\r\nAfter updating the qwen3.5 modeling and changing ```in_proj_qkv``` with ```in_proj_z``` to fused ```in_proj_qkvz``` and  ```in_proj_b``` with ```in_proj_a``` to fused ```in_proj_ba```, quantization no longer works\r\n\r\n<img width=\"1211\" height=\"383\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c5452ebe-c901-425e-824f-30c43b49869a\" />\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. --> ution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review Process\r\n\r\n1. Ping Merge Oncalls to start the PR flow. See the [PR Merge Process](https://github.com/s", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/model_executor/model_runner.py", "python/sglang/srt/model_loader/loader.py", "python/sglang/srt/utils/common.py"], "commit_sha": "b4cb31f698", "date_fixed": "2026-03-31T07:37:33Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-085", "title": "Fix bug in dbrx model", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "DbrxAttentionConfig missing rope_parameters attribute, causing AttributeError when dbrx model code accesses rope configuration", "rationale": "DbrxAttentionConfig object does not define a rope_parameters attribute, causing AttributeError when the dbrx model code attempts to access rope parameters during initialization. The fix adds the missing attribute to the config class.", "pr_number": 21445, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/21445", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\ndbrx model bugfix:\r\nAttributeError: 'DbrxAttentionConfig' object has no attribute 'rope_parameters'\r\n<img width=\"274\" height=\"523\" alt=\"image\" src=\"https://github.com/user-attachments/assets/5a630130-8f8c-461d-98b3-8985f84c7317\" />\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\nfor **test_ascend_dbrx_instruct.py** :\r\nbefore\r\n<img width=\"913\" height=\"413\" alt=\"image\" onale": "Wrong kv_item_lens computation in PD separation when ASCEND_USE_FIA is set. k_buffer shape changes in FIA mode require page_size multiplication. Missing factor leads to wrong KV cache item lookup and incorrect outputs.", "pr_number": 15852, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/15852", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nOriginal `k_buffer` shape is` (layer_num, size // page_size + 1, page_size, head_num, head_dim)`,\r\nwhen enable `ASCEND_USE_FIA` `k_buffer `shape is `(layer_num, (size // page_size + 1) * page_size, 1, head_num, head_dim)`.\r\n\r\nThe element size of `self.get_key_buffer(i)[0]` in `def get_contiguous_buf_infos()`:\r\noriginal is `page_size * head_num * head_dim`,\r\nwhen enable `ASCEND_USE_FIA` is `1 * head_num * head_dim`.\r\n\r\nSo when enable `ASCEND_USE_FIA`, The calculation of kv_item_lens requires the addition of `* page_size`.\r\n\r\n## Modifications\r\n\r\nFix kv_item_lens for FIA, in order to compute data size in PD transfer cases.\r\n\r\n## Accuracy Tests\r\n\r\n```\r\npython3 few_shot_gms8k.py --data-path \"/PATH/TO/test.jsonl.txt\" --parallel 32 --num-questions 200\r\nAccuracy: 0.880\r\nInvalid: 03000\r\nLatency: 37.457\r\n```\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html eds ASCEND_NPU_PHY_ID env var. Falls back to gpu_id which is incorrect in containers.", "pr_number": 14266, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/14266", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\nfor ascend env, npu phy id should be used for mooncake backend when running in container env\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\n## Modifications\r\nuse phy id from ASCEND_NPU_PHY_ID in container env, otherwise use gpu_id\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [x] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [x] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [x] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [x] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n- [ ] Work with maintainers to merge your PR. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process)\r\n", "pr_labels": ["documentation", "run-ci"], "files_fixed": ["docs/advanced_features/pd_disaggregation.md", "python/sglang/srt/disaggregation/mooncake/transfer_engine.py", "python/sglang/srt/environ.py"], "commit_sha": "42271376d1", "date_fixed": "2025-12-03T03:33:43Z", "source": "pr", "needs_review": false, "audit_count": 4}, {"bug_id": "BUG-2026-091", "title": "[NPU]Fix GLM-4.7-Flash failed on NPU", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "GPU op optimizations (dsv3_router_gemm import guard, missing _gfx95_quant_format member) cause GLM-4.7-Flash to fail on NPU", "rationale": "GPU-specific optimizations break NPU compatibility for GLM-4.7-Flash. Two root causes with clear fixes.", "pr_number": 22509, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/22509", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nGPU op optimizations caused GLM-4.7-Flash to fail when running on the NPU; this PR implements compatibility adjustments to address this issue.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n1. glm4_moe_lite.py Only import dsv3_router_gemm when running on GPU\r\n2. deepseek_v2.py Fixed the case where `self` lacked the `_gfx95_quant_format` member variable.\r\n\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n<img width=\"1132\" height=\"154\" alt=\"ScreenShot_2026-04-10_163301_050\" src=\"https://github.com/user-attachments/assets/5fa7b1ef-1c7e-43d9-9e41-f15935c119a1\" />\r\n\r\n\r\n## Speed Tests and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [x] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [x] Follow the SGLang code style [guidance](htt", "pr_labels": ["deepseek", "run-ci"], "files_fixed": ["python/sglang/srt/models/deepseek_v2.py", "python/sglang/srt/models/glm4_moe_lite.py"], "commit_sha": "92f28e9ba8", "date_fixed": "2026-04-22T17:06:59Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-098", "title": "[NPU] fix eagle3 accept rate", "category": "precision_loss", "severity": 3, "confidence": 0.85, "root_cause": "NPU Eagle3 graph and non-graph implementations missing per-step sequence length updates for draft tokens in ascend_backend and eagle_draft_npu_graph_runner, causing incorrect accept rate computation in speculative decoding because seq_len stays at initial value instead of incrementing per draft step", "rationale": "NPU Eagle3 not updating sequence lengths per draft step in graph mode. Causes incorrect accept rate and wrong speculative decoding behavior silently. Root cause is missing host seq len updates per draft step.", "pr_number": 21255, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/21255", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nThe previous NPU Eagle3 implementation didn't update the sequence lengths for each draft step. This PR fixes that issue.\r\n\r\n## Modifications\r\n\r\nAdded host seq len update code for eagle3 graph/non-graph impl.\r\n\r\n## Accuracy Tests\r\nbefore:\r\n<img width=\"1033\" height=\"105\" alt=\"image\" src=\"https://github.com/user-attachments/assets/697946ed-4c48-4996-99d0-00e31fc80b3f\" />\r\n\r\n\r\nafter:\r\n<img width=\"1031\" height=\"104\" alt=\"image\" src=\"https://github.com/user-attachments/assets/4666a0c2-adc9-4433-b8e6-532739be9f28\" />\r\n\r\n\r\n## Benchmarking and Profiling\r\n\r\nbefore:\r\n<img width=\"368\" height=\"576\" alt=\"image\" src=\"https://github.com/user-attachments/assets/31d476c6-e17f-4713-baa7-19e1e0e6a78c\" />\r\nafter:\r\n<img width=\"376\" height=\"574\" alt=\"image\" src=\"https://github.com/user-attachments/assets/78b5ab8d-8715-4620-bebd-259d072e3d5b\" />\r\n\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-gu", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/attention/ascend_backend.py", "python/sglang/srt/hardware_backend/npu/graph_runner/eagle_draft_npu_graph_runner.py"], "commit_sha": "673ffb3116", "date_fixed": "2026-03-30T13:58:26Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-102", "title": "[Fix] Patch is_flash_attn_2_available for flash-attn-4 in VLM input format test", "category": "compatibility", "severity": 3, "confidence": 0.9, "root_cause": "flash-attn-4 namespace package registers as importable flash_attn with no actual content, causing transformers.utils.is_flash_attn_2_available() to return True and HF remote model code to attempt importing nonexistent symbols (flash_attn_func, flash_attn_varlen_func) from empty namespace, causing ImportError on VLM model loading", "rationale": "flash-attn-4 namespace package causes is_flash_attn_2_available() false positive. Calling non-existent flash attention functions would crash. Package version compatibility issue with no clear NPU-specific root cause.", "pr_number": 20946, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/20946", "pr_body": "## Motivation\r\n\r\nsglang now depends on `flash-attn-4` (>= 4.0.0b4) introduced in https://github.com/sgl-project/sglang/pull/20303 . Unlike `flash-attn` v2, `flash-attn-4` registers a bare `flash_attn` **namespace package** with no actual content — no `flash_attn_func`, no `flash_attn_varlen_func`, and no `flash_attn.bert_padding` submodule.\r\n\r\nThis causes `transformers.utils.is_flash_attn_2_available()` to return `True` (it can `find_spec(\"flash_attn\")`), so HuggingFace remote model code that guards flash-attn v2 imports behind that check still attempts the import and crashes:\r\n\r\n```\r\nImportError: cannot import name 'flash_attn_func' from 'flash_attn' (unknown location)\r\n```\r\n\r\nThis breaks `TestKimiVLImageUnderstandsImage` in `test_vlm_input_format.py`, because the Kimi-VL remote `modeling_kimi_vl.py` does:\r\n\r\n```python\r\nif is_flash_attn_2_available():\r\n    from flash_attn import flash_attn_func, flash_attn_varlen_func\r\n    from flash_attn.bert_padding import index_first_axis, pad_input, unpad_input\r\n```\r\n\r\nat module level during `get_class_from_dynamic_module()`.\r\n\r\n## Fix\r\n\r\nPatch `is_flash_attn_2_available` to return `False` at both `transformers.utils.import_utils` and `transformers.utils` (since different code paths import from either location) before any HF dynamic module loading happens. The test only exercises the vision tower and does not need flash attention.\r\n\r\n## Test plan\r\n- [x] Verify `TestKimiVLImageUnderstandsImage` passes on CI with `flash-attn-4` installed", "pr_labels": ["Multi-modal", "npu", "run-ci"], "files_fixed": ["python/sglang/srt/utils/hf_transformers_utils.py"], "commit_sha": "a02cff7f2b", "date_fixed": "2026-03-19T20:00:52Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-103", "title": "[Fix] Slice input_embeds to extend_input_len in prepare_for_extend", "category": "crash", "severity": 10, "confidence": 0.9, "root_cause": "PrefillAdder chunk truncation in scheduler adjusts fill_ids and extend_input_len but not req.input_embeds when chunked_prefill_size is exceeded on concurrent input_embeds requests, causing shape mismatch RuntimeError in set_kv_buffer because out_cache_loc is sized for truncated length but input_embeds is full length", "rationale": "PrefillAdder truncation adjusts fill_ids and extend_input_len but not req.input_embeds, causing shape mismatch crash in set_kv_buffer. Input tensor slicing not propagated to embeddings.", "pr_number": 20376, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/20376", "pr_body": "## Motivation\n\nWhen `PrefillAdder` truncates a request on chunk overflow (`rem_chunk_tokens` exceeded), it adjusts `fill_ids` and `extend_input_len` but **not** `req.input_embeds`. `prepare_for_extend` then appends the full-length embedding array while `out_cache_loc` is sized for the truncated `extend_input_len`, causing:\n\n```\nRuntimeError: shape mismatch: value tensor of shape [N, ...]\n  cannot be broadcast to indexing result of shape [M, ...]\n```\n\nin `set_kv_buffer`, with **N > M** (opposite polarity to the retraction bug in #14110, which is N < M — that's a different bug, same crash signature).\n\n**Trigger condition:** many input_embeds requests arrive in one scheduler iteration (thundering herd) and their total tokens exceed `chunked_prefill_size`. In our RL setup this happens at rollout start immediately after `update_weights_from_distributed` — 256 requests land near-simultaneously. With 125-token prompts and `chunked_prefill_size=8192`: 65 requests fit (8125 tokens), request #66 gets truncated to 67 tokens but its 125-token embedding array flows through unsliced.\n\nThe `input_ids` path already handles this correctly since `fill_ids` itself is truncated by the adder.\n\n## Modifications\n\nSlice `req.input_embeds` with `[pre_len : pre_len + req.extend_input_len]` to match what was already applied to `fill_ids`. No-op for non-chunked requests (`pre_len=0`, `extend_input_len=len(embeds)`).\n\nChunk continuation works because `ChunkCache.cache_unfinished_req` sets `prefix_indices` to the processed length after each chunk, and `req.input_embeds` is never mutated — so chunk 2 correctly slices `[trunc_len : trunc_len + remaining]`.\n\n## Accuracy Tests\n\nThis is a runtime crash fix. Verified on Qwen2.5-7B-Instruct with `--disable-radix-cache --chunked-prefill-size 8192` under concurrent input_embeds load — previously crashed reliably at the chunking boundary, now completes cleanly.\n\nNo new unit test — the trigger requires concurrent load exceeding `chunked_prefill_size`, hard", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/managers/schedule_batch.py", "python/sglang/srt/managers/scheduler.py", "test/registered/embedding/test_input_embeds_chunked.py"], "commit_sha": "7c773ddb0a", "date_fixed": "2026-03-15T07:07:06Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-105", "title": "[Fix] NPU deepep hccl buffer and fix IPC safe check", "category": "compatibility", "severity": 3, "confidence": 0.85, "root_cause": "insufficient HCCL buffer allocation for deepep token dispatch on NPU and missing IPC handle safe serialization for torch_npu", "rationale": "NPU requires more HCCL buffer for token dispatch with deepep enabled, and IPC safe check needs NPU-specific handling. Insufficient HCCL buffer can cause communication timeouts or crashes. IPC fix addresses device semantic mismatch.", "pr_number": 17804, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/17804", "pr_body": "\r\n\r\n<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\n1. In npu device, when deepep is enabled, it requires more hccl buffer to process token dispatch. So in order to not mix with other HCCL buffer, we config the ep pg seperately(We do not want every pg to be that big) . \r\n\r\n<img width=\"1165\" height=\"353\" alt=\"image\" src=\"https://github.com/user-attachments/assets/0a081fad-d956-4cb2-81b5-4c2c6ff7242c\" />\r\n\r\n\r\n2. enable ipc handle safe serialization for torch_npu \r\n\r\n<img width=\"1237\" height=\"442\" alt=\"image\" src=\"https://github.com/user-attachments/assets/5768a256-ba05-474c-b641-0fe0e5cd17f7\" />\r\n\r\n## Modific
