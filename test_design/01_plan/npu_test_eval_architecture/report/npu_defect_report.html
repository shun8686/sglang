<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>NPU Defect Database Report</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --text2: #94a3b8; --accent: #38bdf8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1500px; margin: 0 auto; padding: 16px 20px; }
  header { text-align: center; padding: 28px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  header .subtitle { color: var(--text2); font-size: 13px; margin-top: 4px; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-card .num { font-size: 30px; font-weight: 700; }
  .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .chart-card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 10px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
  .bar-label { width: 100px; text-align: right; flex-shrink: 0; font-size: 11px; }
  .bar-track { flex: 1; height: 18px; background: #0f172a; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: 600; }
  .bar-count { width: 32px; text-align: right; font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
  .toolbar input, .toolbar select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .toolbar input { flex: 1; min-width: 200px; }
  .toolbar input::placeholder { color: var(--text2); }
  .toolbar select { min-width: 110px; cursor: pointer; }
  .toolbar .count-badge { font-size: 12px; color: var(--text2); padding: 6px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; }
  .toolbar button { background: var(--accent); color: #0f172a; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
  .toolbar button:hover { opacity: 0.85; }
  .toolbar .reset-btn { background: var(--border); color: var(--text); }
  .keyboard-hint { font-size: 10px; color: var(--text2); margin-left: 4px; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { position: sticky; top: 0; z-index: 2; }
  th { background: #1a2740; color: var(--text2); font-weight: 600; padding: 10px; text-align: left; white-space: nowrap; border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }
  th:hover { color: var(--text); }
  th .sort-arrow { margin-left: 3px; font-size: 9px; }
  td { padding: 7px 10px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
  tbody tr:hover td { background: rgba(56,189,248,0.03); }
  .cat-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
  .cat-crash { background: rgba(239,68,68,0.2); color: #ef4444; }
  .cat-precision_loss { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .cat-compatibility { background: rgba(59,130,246,0.2); color: #3b82f6; }
  .cat-perf_regression { background: rgba(139,92,246,0.2); color: #8b5cf6; }
  .cat-compile_error { background: rgba(6,182,212,0.2); color: #06b6d4; }
  .id-link { color: var(--accent); text-decoration: none; font-weight: 600; font-family: monospace; font-size: 12px; }
  .id-link:hover { text-decoration: underline; }
  .pr-link { color: var(--text2); text-decoration: none; font-size: 11px; }
  .pr-link:hover { color: var(--text); text-decoration: underline; }
  .title-cell { max-width: 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .root-cause-cell { max-width: 250px; font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .label-tag { display: inline-block; background: rgba(148,163,184,0.12); color: var(--text2); padding: 1px 5px; border-radius: 3px; font-size: 10px; margin: 1px; }
  .review-flag { display: inline-block; background: rgba(249,115,22,0.2); color: #f97316; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-left: 4px; }
  .conf-cell { font-size: 12px; white-space: nowrap; }
  .conf-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .expand-btn { cursor: pointer; color: var(--accent); font-size: 14px; font-weight: 700; border: none; background: none; width: 24px; text-align: center; }
  .expand-btn:hover { opacity: 0.7; }
  .detail-row { display: none; }
  .detail-row.show { display: table-row; }
  .detail-row td { padding: 16px 18px; background: #0f172a; border-bottom: 2px solid var(--border); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
  @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }
  .detail-grid .dl { margin-bottom: 6px; }
  .detail-grid .dt { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; font-weight: 600; }
  .detail-grid .dd { font-size: 13px; }
  .detail-grid .dd.files { font-family: monospace; font-size: 11px; color: var(--text2); line-height: 1.6; }
  .detail-grid .dd.files span { display: block; }
  .pr-body-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .pr-body-section .dt { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; font-weight: 600; }
  .pr-body-section .dd { font-size: 12px; color: var(--text2); white-space: pre-wrap; word-break: break-word; max-height: 280px; overflow-y: auto; background: #0a0f1a; padding: 10px; border-radius: 6px; line-height: 1.5; }
  .no-results { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
  footer { text-align: center; padding: 20px; color: var(--text2); font-size: 11px; border-top: 1px solid var(--border); margin-top: 24px; }
</style>

<div class="container">

<header>
  <h1>NPU Defect Database Report</h1>

</header>

<div class="stats-row" id="statsRow"></div>

<div class="charts-row">

  <div class="chart-card"><h3>Confidence Distribution</h3><div id="confChart"></div></div>
</div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Search bug ID, title, root cause, rationale, files, labels..." oninput="applyFilters()">
  <select id="catFilter" onchange="applyFilters()">
    <option value="">All Categories</option>
    <option value="crash">Crash</option>

    <option value="precision_loss">Precision Loss</option>
    <option value="perf_regression">Perf Regression</option>
    <option value="compile_error">Compile Error</option>
  </select>

    <option value="">All Severities</option>
    <option value="10">Sev 10 — Critical (Crash/OOM/Hang)</option>

    <option value="1">Sev 1 — Minor (Perf/Compile/Boundary)</option>

    <option value="">All Confidence</option>
    <option value="high">High (&ge;90%)</option>
    <option value="med">Medium (70-89%)</option>
    <option value="low">Low (&lt;70%)</option>
  </select>
  <select id="labelFilter" onchange="applyFilters()"><option value="">All Labels</option></select>

    <option value="">All Status</option>

  <th onclick="sortTable('severity')" style="width:55px">Sev <span class="sort-arrow"></span></th>
  <th onclick="sortTable('confidence')" style="width:75px">Conf <span class="sort-arrow"></span></th>
  <th onclick="sortTable('title')">Title <span class="sort-arrow"></span></th>

</tr></thead>

</div>

<footer id="pageFooter"></footer>

<script>
var DEFECTS = [{"bug_id": "BUG-2026-001", "title": "【NPU】【bugfix】accuracy fix when enable both nsa cp and prefixcache", "category": "precision_loss", "severity": 3, "confidence": 0.6, "root_cause": "KV sequence length calculations do not include prefix cache lengths when NSA context parallelism is enabled, causing attention to read from wrong KV cache positions (limited evidence)", "rationale": "Produces silently incorrect outputs per the description. KV cache position mismatch under NSA CP + prefix cache causes wrong attention reads without any error signal.", "pr_number": 23268, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23268", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nwhen enable both nsa cp and prefixcache, inference accuracy is abnormal.\r\n\r\n\r\n## Modifications\r\n\r\npython/sglang/srt/hardware_backend/npu/modules/deepseek_v2_attention_mla_npu.py\r\npython/sglang/srt/layers/attention/nsa/nsa_indexer.py\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Speed Tests and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review and Merge Process\r\n\r\n1. Ping Merge Oncalls to start the process. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/sglang/blob/main/.github/CODE", "pr_labels": ["deepseek", "npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/modules/deepseek_v2_attention_mla_npu.py", "python/sglang/srt/layers/attention/nsa/nsa_indexer.py"], "commit_sha": "b1e1fe8eee", "date_fixed": "2026-04-28T01:08:29Z", "source": "pr", "needs_review": true, "audit_count": 6}, {"bug_id": "BUG-2026-014", "title": "[NPU] Fix warmup error with --disable-cuda-graph and mtp", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "Redundant padding tokens in the input tensor cause a dimension mismatch for the NPU fused attention operator during forward_decode with --disable-cuda-graph and MTP", "rationale": "Warmup error during forward_decode with --disable-cuda-graph enabled. Root cause is redundant padding tokens not cropped before calling torch.ops.npu.npu_fused_infer_attention_score. Fix crops the query tensor to remove padding, runs the operator, then pads zeros back.", "pr_number": 23819, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23819", "pr_body": "## Motivation\r\nThe server warmup encounters an error in forward_decode when --disable-cuda-graph is enabled. The root cause is the redundant padding tokens in the input tensor, which leads to a dimension mismatch for the NPU fused attention operator.\r\n```\r\nFile \"/xxx/sglang/srt/hardware_backend/npu/attention/ascend_backend.py\", line 1846, in forward_decode\r\nattn_output, _ = torch.ops.npu.npu_fused_infer_attention_score(\r\n```\r\n\r\n## Modification\r\n\r\nFix the padding logic in forward_decode for the NPU attention backend:\r\n\r\n- Crop the query tensor to remove redundant padding tokens before calling the NPU fused attention operator\r\n- Run the fused attention operator with the valid tensor\r\n- Pad zeros back to restore the original tensor shape after the operator computation\r\n\r\n## Accuracy Tests\r\n\r\n```\r\nexport DEEP_NORMAL_MODE_USE_INT8_QUANT=0\r\nexport SGLANG_DEEPEP_BF16_DISPATCH=1\r\n\r\nMODEL_PATH=/home/weights/Qwen3.6-35B-A3B\r\npython3 -m sglang.launch_server \\\r\n        --model-path ${MODEL_PATH} \\\r\n        --attention-backend ascend \\\r\n        --device npu \\\r\n        --tp-size 4 --nnodes 1 --node-rank 0 \\\r\n        --chunked-prefill-size -1 --max-prefill-tokens 16384 \\\r\n        --trust-remote-code \\\r\n        --host 127.0.0.1 --max-running-requests 128 \\\r\n        --mem-fraction-static 0.8 \\\r\n        --port 9903 \\\r\n        --mm-attention-backend ascend_attn --max-total-tokens 800000 \\\r\n        --dtype bfloat16 --mamba-ssm-dtype bfloat16 \\\r\n        --base-gpu-id 4 \\\r\n        --enable-multimodal \\\r\n        --disable-radix-cache \\\r\n        --dp-size 2 --enable-dp-attention --enable-dp-lm-head \\\r\n        --speculative-algorithm NEXTN --speculative-num-steps 3 --speculative-eagle-topk 1 --speculative-num-draft-tokens 4 \\\r\n        --speculative-draft-model-quantization unquant \\\r\n        --moe-a2a-backend deepep --deepep-mode auto \\\r\n        --disable-cuda-graph \\\r\n```\r\n\r\n```\r\n+-----------------+-----------+----------+------------------------------------------+-------+---------+--------", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/attention/ascend_backend.py"], "commit_sha": "09a4828db9", "date_fixed": "2026-05-11T01:53:34Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-015", "title": "[NPU] [Bugfix] Wan quantization fix", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "reverse_param_names_mapping discarded in ModelSlim init path, causing _get_scheme_from_parts to use internal model layer names instead of architecture-canonical names for quant config lookup in Wan2.2-T2V-A14B-Diffusers W8A8/mxfp8", "rationale": "Wan2.2 diffusion model fails to load with 'No modelslim compatible scheme' because reverse_param_names_mapping is not threaded through the ModelSlim config stack. After PR #23625 reshaped quantized-diffusion prefixes, the quant config file uses architecture-canonical names while the model uses internal layer names. Fix threads the mapping through modelslim.py, transformer_load_utils.py, quantization_utils.py, and fsdp_load.py.", "pr_number": 24540, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/24540", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Description\r\n\r\nFix Wan2.2-T2V-A14B-Diffusers-w8a8/w8a8/mxfp8 quant scheme recognition on NPU by threading\r\n`reverse_param_names_mapping` through the ModelSlim config stack.\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nFix of https://github.com/sgl-project/sglang/issues/24518. After PR #23625 reshaped quantized‑diffusion prefixes, the Wan2.2‑W8A8 model stopped loading (`No modelslim compatible scheme`). The bug is that `_get_scheme_from_parts` uses the **model’s internal layer name** (e.g. `blocks.0.self_attn.to_q`) to look up the quant description, but the quant config file uses **architecture‑canonical names** (e.g. `blocks.0.attn1.to_q`).\r\n\r\nThe WanVideo arch‑config already carries a `reverse_param_names_mapping` that translates internal names back to canonical names, but the ModelSlim initialisation path silently discarded this mapping.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n- **`modelslim.py`** – accept `reverse_param_names_mapping` in `__init__` and `from_config`, build a mapper via `get_param_names_mapping`, and use it in `_get_scheme_from_parts` before querying `quant_model_description.json`.\r\n- **`transformer_load_utils.py`** – read `reverse_param_names_mapping` from the arch config and pass it into `get_quant_config`.\r\n- **`quantization_utils.py`** – accept and forward `reverse_param_names_mapping`.\r\n- **`fsdp_load.py`** – add missing quant parameter suffixes (`input_offset`, `quant_bias`, `deq_scale`) to the sharding allow‑list; mark sharded tensors with `requires_grad=False` to avoid meta‑tensor copy errors.\r\n- **`npu/utils.py`** – update a performance warning to mention `--dit-cpu-offload false`.\r\n\r\n## Accuracy Test", "pr_labels": ["documentation", "quant", "npu", "run-ci", "diffusion"], "files_fixed": ["python/sglang/multimodal_gen/runtime/layers/quantization/modelslim.py", "python/sglang/multimodal_gen/runtime/loader/transformer_load_utils.py", "python/sglang/multimodal_gen/runtime/utils/quantization_utils.py", "python/sglang/multimodal_gen/test/server/ascend/perf_baselines_npu.json", "python/sglang/srt/hardware_backend/npu/utils.py"], "commit_sha": "9ec2880eca", "date_fixed": "2026-05-11T05:32:57Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-016", "title": "[NPU] Fix mrope_position computation in Eagle Worker v2 with PlanStream", "category": "precision_loss", "severity": 3, "confidence": 0.95, "root_cause": "Race condition: mrope_position is computed on the plan stream using draft outputs from the default stream when SGLANG_ENABLE_SPEC_V2 and SGLANG_ENABLE_OVERLAP_PLAN_STREAM are both enabled, producing incorrect positional values for Eagle speculative decoding in multimodal scenarios", "rationale": "When both SGLANG_ENABLE_SPEC_V2 and SGLANG_ENABLE_OVERLAP_PLAN_STREAM are enabled in multimodal scenarios, Eagle Worker v2 computes mrope_position on the plan stream while draft outputs are on the default stream, causing a race condition that produces incorrect mrope_position values. Fix computes mrope_position on the default stream and copies to the graph buffer when CUDA graph is enabled.", "pr_number": 23423, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23423", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nWhen SGLANG_ENABLE_SPEC_V2 and SGLANG_ENABLE_OVERLAP_PLAN_STREAM are enabled in multimodal scenarios, the Eagle Worker v2 computes mrope_position on the plan stream using draft outputs from the default stream. This race condition leads to incorrect mrope_position values.\r\n\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\nCompute mrope_position on the default stream, and copy it to the graph buffer when CUDA graph is enabled.\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Speed Tests and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ : false, \"pin_cpu_memory\": tru", "pr_labels": ["run-ci", "diffusion"], "files_fixed": ["python/sglang/multimodal_gen/runtime/layers/activation.py", "python/sglang/multimodal_gen/runtime/models/encoders/gemma2.py", "python/sglang/multimodal_gen/runtime/models/schedulers/scheduling_dpm_solver_multistep.py"], "commit_sha": "ed70226ec1", "date_fixed": "2026-05-11T05:41:36Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-032", "title": "[NPU] fix profiler on npu", "category": "compatibility", "severity": 1, "confidence": 0.95, "root_cause": "Torch profiler on NPU lacks experimental_config needed for operator shape recording, causing SGLANG_PROFILE_RECORD_SHAPES to have no effect on NPU", "rationale": "When using sglang.bench_serving --profile on NPU, operator shape information is missing despite the SGLANG_PROFILE_RECORD_SHAPES environment variable being set. The fix adds experimental_config for torch profiler on NPU to enable operator shape recording and operator statistics collection.", "pr_number": 24685, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/24685", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nWhen using sglang.bench_serving --profile to collect profiling data on NPU, operator shape information is still missing even if the SGLANG_PROFILE_RECORD_SHAPES environment variable is set. This PR fixes the issue and also collects operator statistics along with other profiling information on NPU.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\nadd experimental_config for torch profiler on NPU.\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects mode ulative components plus three test files. PR body provides minimal detail on the specific errors. Root_cause 'token_routing' is too narrow for the breadth of product code changes.", "pr_number": 13834, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/13834", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nfix prs #13478 and #13676 break NPU CI\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.ai/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.ai/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.ai/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.ai/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.ai/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.ai/developer_guide/contribution_guide.html#code-style-guidance).\r\n- [ ] Work with maintainers to merge your PR. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process)\r\n", "pr_labels": ["deepseek", "npu", "run-ci"], "files_fixed": ["python/sglang/srt/mem_cache/allocator_ascend.py", "python/sglang/srt/model_executor/cuda_graph_runner.py", "python/sglang/srt/model_executor/input_buffers.py", "python/sglang/srt/model_executor/npu_graph_runner.py", "python/sglang/srt/speculative/spec_utils.py", "test/manual/ascend/test_ascend_deepseek_mtp.py", "test/srt/ascend/test_ascend_tp1_bf16.py", "test/srt/run_suite.py"], "commit_sha": "db0ffc09ef", "date_fixed": "2025-11-25T02:09:36Z", "source": "pr", "needs_review": true, "audit_count": 5}, {"bug_id": "BUG-2025-037", "title": "[Bug fix] Fix Gemma 2 and fix Gemma 3 multimodal with bs > 1 on NPU", "category": "precision_loss", "severity": 3, "confidence": 0.95, "root_cause": "Gemma3 multimodal: missing page alignment for chunked batch with batch_size > 1 on NPU. Gemma2: incorrect forward_npu method for GemmaRMSNorm. Phi-3: accuracy regression with tensor parallelism (tp1: 0.85, tp2: 0.75, tp4: 0.56)", "rationale": "Three separate fixes for NPU inference accuracy: (1) Gemma3 multimodal batch >1 requires page alignment for chunked batch, (2) Gemma2 RMSNorm forward_npu method is incorrect, (3) Phi-3 model accuracy degrades significantly with TP>1. All produce silently incorrect outputs without error signals.", "pr_number": 9871, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/9871", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\n\r\nFix inference of Gemma 2 and Gemma 3 multimodal scenario with batch > 1 on Ascend devices and Phi3 model problem\r\n\r\n## Modifications\r\n\r\nTo fix Gemma 3 mulimodal with bs > 1: make page allignment for chunked batch.\r\nTo fix Gemma 2 - modified forward_npu method for GemmaRMSNorm operation.\r\nFix phi-3 model accuracy from with tp_size: tp1: 0.85  tp2: 0.75  tp4: 0.56\r\n\r\n## Accuracy Tests\r\n\r\nGSM8K test for Gemma2:\r\n\r\n<img width=\"360\" height=\"79\" alt=\"image\" src=\"https://github.com/user-attachments/assets/f3ed8867-9b4d-4026-80e7-03536b94138f\" />\r\n\r\n## Benchmarking and Profiling\r\n\r\nNo performance changes\r\n\r\n## Checklist\r\n\r\n- [  x ] Format your code according to the [Format code with pre-commit](https://docs.sglang.ai/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- \r\n<img width=\"744\" height=\"339\" alt=\"image\" src=\"https://github.com/user-attachments/assets/3db13b31-61e7-488c-9f5e-675191c2bc8c\" />\r\n\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.ai/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.ai/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.ai/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.ai/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n", "pr_labels": [], "files_fixed": ["python/sglang/srt/layers/layernorm.py", "python/sglang/srt/layers/logits_processor.py", "python/sglang/srt/managers/schedule_policy.py"], "commit_sha": "5dd8c6444b", "date_fixed": "2025-09-08T08:19:40Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-038", "title": "[NPU] Fix Z-Image negative-branch rotary embeddings for CFG", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "Uses batch.prompt_embeds[0] instead of batch.negative_prompt_embeds[0] for RoPE positions in CFG negative branch", "rationale": "Uses batch.prompt_embeds[0] instead of batch.negative_prompt_embeds[0] for RoPE positions in CFG negative branch, causing a tensor size mismatch crash ('The size of tensor a (32) must match the size of tensor b (192)') when positive and negative prompts have different token lengths. The fix swaps to the correct negative_prompt_embeds source.", "pr_number": 23538, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23538", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n \r\nFix Z-Image negative prompt rotary embeddings.\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\n## Modifications\r\n\r\nUse `batch.negative_prompt_embeds[0]` when preparing negative-condition `freqs_cis`.\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Deploy\r\n```\r\nnohup sglang serve \\\r\n--model-path /Z-Image \\\r\n--port 8080 \\\r\n--log-level debug \\\r\n--host 0.0.0.0 > sglang.log 2>&1 &\r\n```\r\n\r\n## Accuracy Tests\r\nUsing 0.5k image as an example:\r\n```\r\nimport requests\r\nimport base64\r\nfrom PIL import Image\r\nimport io\r\n\r\n# /v1/images/generations接口实现\r\nresponse = requests.post(\r\n    \"http://localhost:8080/v1/images/generations\",\r\n    json={\r\n        \"prompt\": \"a black and white cat wearing a princess tiara\",\r\n        \"size\": \"512x512\",\r\n        \"num_inference_steps\": 50,\r\n        \"response_format\": \"b64_json\",\r\n        \"seed\": 42,\r\n        \"n\": 1\r\n    }\r\n)\r\nimg_data = response.json()[\"data\"][0][\"b64_json\"]\r\nimg_bytes = base64.b64decode(img_data)\r\nimg = Image.open(io.BytesIO(img_bytes))\r\nimg.save(\"cat.png\")\r\n```\r\nThe main has errors: \r\n```\r\n[DenoisingStage] Error during execution after 1975.5837 ms:\r\nThe size of tensor a (32) must match the size of tensor b (192) at non-singleton dimension 1\r\n\r\nFile \"/sgl-workspace/sglang/python/sglang/multimodal_gen/runtime/pipelines_core/stages/base.py\", line 209, in __call__\r\n  result = self.forward(batch, server_args)\r\n\r\nFile \"/sgl-workspace/sglang/python/sglang/multimodal_gen/runtime/pipelines_core/stages/denoising.py\", line 1148, in forward\r\n  self._run_denoising_step(ctx, step, batch, server_args)\r\n\r\nFile \"/sgl-workspace/sglang/python/sglang/multimodal_gen/runtime/pipelines_core/stages/denoising.py\", line 787, in _run_denoising_step\r", "pr_labels": ["run-ci", "diffusion"], "files_fixed": ["python/sglang/multimodal_gen/configs/pipeline_configs/zimage.py", "python/sglang/multimodal_gen/test/unit/test_zimage_pipeline_config.py"], "commit_sha": "e37f46fcf7", "date_fixed": "2026-05-03T13:18:27Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-039", "title": "[NPU] fix some npu error with OffloaderV2", "category": "crash", "severity": 10, "confidence": 0.9, "root_cause": "npu_format_cast on meta tensors (wrong device), storage corruption during MoE weight transpose, and missing weight_loader attribute in OffloaderV2", "rationale": "Multiple crash-causing issues in OffloaderV2 on NPU. Clear root causes with targeted fixes across three files.", "pr_number": 19541, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/19541", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nwhen set --offload-mode=meta or sharded_gpu in feature offloaderV2, it doesn't work with npu.Then I fix some error to support those features in npu.\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n1.fix attr weight_loader of params missing in func _move_param_to_meta\r\n2.Skip format cast for meta tensors\r\n3.process tensor to be contiguous\r\n\r\n**For this configuration:**\r\npython -m sglang.launch_server \\\r\n--model-path /home/weights/deepseekv3-lite-base-latest \\\r\n--host 127.0.0.1 \\\r\n--port 8080 \\\r\n--attention-backend ascend \\\r\n--mem-fraction-static 0.9 \\\r\n--base-gpu-id 14 \\\r\n--tp 1 \\\r\n--dp 2 \\\r\n--offload-num-in-group 1 \\\r\n--offload-prefetch-step 1 \\\r\n--offload-mode sharded_gpu \\\r\n--offload-group-size 4 \\\r\n--disable-cuda-graph \\\r\n\r\ncurl --location 'http://127.0.0.1:8080/generate' --header 'Content-Type:application/json' --data '{\"text\": \"The captial of France is\", \"sampling_params\": {\"temperature\": 0, \"max_new_tokens\": 20}}\r\n\r\n**Before:**\r\n<img width=\"1245\" height=\"527\" alt=\"image\" src=\"https://github.com/user-attachments/assets/cc5907c4-497c-4833-8b18-c009bae66ea5\" />\r\n**After the first modification:**\r\n<img width=\"1254\" height=\"646\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c86af792-3aa2-4c00-9b83-a402da56ec26\" />\r\n**After the second modification:**\r\n<img width=\"988\" height=\"441\" alt=\"image\" src=\"https://github.com/user-attachments/assets/8e133418-0ad6-4fbe-8312-57a0af9d31de\" />\r\n**After the third modification:**\r\nthe output is nomal\r\n<img width=\"1251\" height=\"300\" alt=\"image\" src=\"https://github.com/user-attachments/assets/b25c3fe0-a9df-43b5-9d03-8041fb5bfb16\" />\r\n\r\nthe third modificati", "pr_labels": ["quant", "npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/utils.py", "python/sglang/srt/layers/quantization/unquant.py", "python/sglang/srt/utils/offloader.py", "test/registered/ascend/basic_function/offloading/test_npu_offload_modes.py"], "commit_sha": "aa74911448", "date_fixed": "2026-04-30T12:05:35Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-040", "title": "[NPU] add split_qkv_tp_rmsnorm_rope ops for minimax2 & fix eagle3 hidden states capture in dp attn mode", "category": "crash", "severity": 10, "confidence": 0.9, "root_cause": "Hidden state capture timing in Eagle3 speculative decoding combined with CUDA graph and DP attention crashes when batch size > 1 on NPU", "rationale": "Eagle3 combined with CUDA graph and DP attention mode crashes at batch size > 1 due to incorrect hidden state capture timing. The PR explicitly describes this as a crash error. Also adds split_qkv_tp_rmsnorm_rope ops for MiniMax2 NPU support.", "pr_number": 23190, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23190", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nadd split_qkv_tp_rmsnorm_rope ops for Minimax2\r\n\r\n## Modifications\r\n\r\nadd split_qkv_tp_rmsnorm_rope ops for Minimax2\r\nfix cudagraph+eagle3+dp-attention bs > 1 crash error\r\n\r\n## Accuracy Tests\r\n\r\n<img width=\"1220\" height=\"115\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c4a332b3-07e4-4a20-a12f-397952ed7278\" />\r\n\r\n\r\n## Speed Tests and Profiling\r\n\r\nbefore:\r\n<img width=\"381\" height=\"611\" alt=\"image\" src=\"https://github.com/user-attachments/assets/168aa602-ee2b-4bde-8192-d6f26130a131\" />\r\n\r\nafter:\r\n<img width=\"371\" height=\"619\" alt=\"image\" src=\"https://github.com/user-attachments/assets/6a3b396c-7895-4562-a329-d68fd9943ebe\" />\r\n\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review and Merge Process\r\n\r\n1. Ping Merge Oncalls to start the process. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/models/minimax_m2.py"], "commit_sha": "3553fd0322", "date_fixed": "2026-04-30T00:51:23Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-042", "title": "[NPU] fix rope_theta get error for baichuan2-13b-chat model", "category": "crash", "severity": 10, "confidence": 0.9, "root_cause": "Baichuan2-13b-chat config lacks rope_theta attribute, causing AttributeError during model loading", "rationale": "AttributeError crash when loading Baichuan2-13b-chat model. Simple fix using getattr with default value.", "pr_number": 21543, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/21543", "pr_body": "## Motivation\r\n\r\nPR https://github.com/sgl-project/sglang/pull/21135 use function `get_rope_config()` to directly get `config.rope_theta`, while in model `baichuan-inc/Baichuan2-13B-Chat`, its `config.json` doesn't have this attribute.\r\n<img width=\"588\" height=\"209\" alt=\"image\" src=\"https://github.com/user-attachments/assets/75e8d508-9849-4505-bc1d-6a3e5c2ad60c\" />\r\n\r\nAffected trust-remote-code models:\r\nBaichuan2-13B-Chat\r\n\r\n## Modifications\r\n\r\nin function `get_rope_config()`, provide a reasonable default(10000) value when `rope_theta` is missing\r\n\r\n## Accuracy Tests\r\n\r\n\r\n## Benchmarking and Profiling\r\n\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review Process\r\n\r\n1. Ping Merge Oncalls to start the PR flow. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/sglang/blob/main/.github/CODEOWNERS) and other reviewers.\r\n3. Trigger CI tests with [comments](https://docs.sglang.io/developer_guide/contribution_guide.html#how-to-trigger-ci-tests) or contact authorized users to do so.\r\n   - `/tag-r", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/utils/hf_transformers/common.py"], "commit_sha": "23cfa9e4c8", "date_fixed": "2026-04-29T04:01:03Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-043", "title": "[NPU] Fix DeepEP LL dispatch BF16 flag and skip triton kernel on NPU for Qwen3.5", "category": "crash", "severity": 10, "confidence": 0.85, "root_cause": "DeepEP LL dispatch lacked BF16 env flag for CANN compatibility; triton fused_qkv kernel not supported on NPU", "rationale": "NPU platform compatibility fix: adds BF16 dispatch flag and skips unsupported triton kernel with contiguous fallback for Qwen3.5. Clear code fix with no ambiguity.", "pr_number": 23815, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23815", "pr_body": "## Motivation\r\nFix two bugs that block NPU inference for Qwen3.5 MoE models with DeepEP backend.\r\n\r\n## Modifications\r\n\r\n### 1. DeepEP low-latency dispatch ignores `SGLANG_DEEPEP_BF16_DISPATCH` (`deepep.py`)\r\nThe normal dispatch path respects `SGLANG_DEEPEP_BF16_DISPATCH` to skip FP8 quantization, but the low-latency dispatch path (`_dispatch_core`) did not check this flag. It always quantized hidden states to INT8/FP8 during all-to-all communication, causing a dtype mismatch on NPU where `npu_grouped_matmul` does not support INT8 input with BF16 weights.\r\n\r\nFix : Added `and not envs.SGLANG_DEEPEP_BF16_DISPATCH.get()` to the `use_fp8` condition in `_dispatch_core` , consistent with the normal dispatch path.\r\n\r\n### 2. Skip triton kernel on NPU in Qwen3.5 GDN forward (`qwen3_5.py`)\r\nThe `fused_qkvzba_split_reshape_cat_contiguous` triton kernel uses a 2D grid that crashes when token count exceeds 65536. This kernel is GPU-only and unnecessary on NPU.\r\n\r\nFix : Added `and not _is_npu` to the condition so NPU uses the PyTorch-native `fix_query_key_value_ordering` path instead.\r\n\r\n## Accuracy Tests\r\n\r\n```\r\nexport DEEP_NORMAL_MODE_USE_INT8_QUANT=0\r\nexport SGLANG_DEEPEP_BF16_DISPATCH=1\r\n\r\nMODEL_PATH=/home/weights/Qwen3.6-35B-A3B\r\npython3 -m sglang.launch_server \\\r\n        --model-path ${MODEL_PATH} \\\r\n        --attention-backend ascend \\\r\n        --device npu \\\r\n        --tp-size 4 --nnodes 1 --node-rank 0 \\\r\n        --chunked-prefill-size -1 --max-prefill-tokens 16384 \\\r\n        --trust-remote-code \\\r\n        --host 127.0.0.1 --max-running-requests 128 \\\r\n        --mem-fraction-static 0.8 \\\r\n        --port 9903 \\\r\n        --mm-attention-backend ascend_attn --max-total-tokens 800000 \\\r\n        --dtype bfloat16 --mamba-ssm-dtype bfloat16 \\\r\n        --base-gpu-id 4 \\\r\n        --enable-multimodal \\\r\n        --disable-radix-cache \\\r\n        --dp-size 2 --enable-dp-attention --enable-dp-lm-head \\\r\n        --cuda-graph-bs 8 12 16 20 24 32 40 48 56 64 \\\r\n        --speculative-algori", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/layers/moe/token_dispatcher/deepep.py", "python/sglang/srt/models/qwen3_5.py"], "commit_sha": "08699bb1b2", "date_fixed": "2026-04-29T02:19:25Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-044", "title": "[Fix] NVFP4 qwen3.5 quant error fix by add packed_modules_mapping", "category": "precision_loss", "severity": 3, "confidence": 0.95, "root_cause": "Missing packed_modules_mapping for Qwen3.5 NVFP4 quantization, causing model loader to fail mapping quantized weight modules", "rationale": "Quantization loading fix: adding packed_modules_mapping enables correct mapping of quantized weights. Without this, model loader crashes or loads wrong weights.", "pr_number": 23471, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23471", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nWhen running NVFP4 Qwen3.5-A35B with SGLang, I noticed that many linear_attn_in_proj layers were not found in the log, which means these layers were quantized. However, the computation precision would be damaged if these layers were quantized. This issue can be observed by running sglang.bench_one_batch.\r\n<img width=\"3278\" height=\"448\" alt=\"image\" src=\"https://github.com/user-attachments/assets/599bc992-bdca-455b-acbf-f6745a58327c\" /> \r\n\r\n\r\nQuantized:\r\n<img width=\"2520\" height=\"810\" alt=\"image\" src=\"https://github.com/user-attachments/assets/b3e0f7be-709d-46c1-b805-a7840d5c4bef\" />\r\n\r\nNot Quantized:\r\n<img width=\"2338\" height=\"1524\" alt=\"image\" src=\"https://github.com/user-attachments/assets/26772c86-fd7a-4ecf-a084-e9da42b0dc37\" />\r\n\r\nTherefore, we may add packed_modules_mapping whether the device is npu or gfx95 or not. \r\n\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Accuracy Tests\r\n\r\nPerformance has been valided by bench serving.\r\n<img width=\"1308\" height=\"1380\" alt=\"image\" src=\"https://github.com/user-attachments/assets/d6ddcc35-a028-452d-8c3d-19f147b2d11e\" />\r\n\r\n\r\n## Speed Tests and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-", "pr_labels": [], "files_fixed": ["python/sglang/srt/models/qwen3_5.py"], "commit_sha": "9814cc89ce", "date_fixed": "2026-04-28T20:36:10Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-045", "title": "[NPU] Fix issue and support GLM-4.5V", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "split_qkv_rmsnorm_rope kernel called with incorrect arguments for GLM-4.5V when use_qk_norm=False on NPU", "rationale": "GLM-4.5V model fails on NPU because split_qkv_rmsnorm_rope kernel is invoked without properly handling the use_qk_norm parameter. The kernel supports NORMS=False mode internally but the caller passes wrong arguments. Fix adds correct argument dispatch based on use_qk_norm.", "pr_number": 22961, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/22961", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nFix issue and support GLM-4.5V on NPU.\r\nIssue link: https://github.com/Ascend/sglang/issues/343\r\n\r\n## Modifications\r\n\r\n1. When calling the split_qkv_rmsnorm_rope function, pass the correct arguments based on the use_qk_norm parameter.The `split_qkv_rmsnorm_rope` kernel already supports `NORMS=False` mode internally.\r\n\r\n## Accuracy Tests\r\n\r\nAccuracy on MMMU dataset:\r\n\r\n-Accuracy: 0.2802\r\n-Invalid: 0.000\r\n-Latency: 89.380 s\r\n-Output throughput: 33.565 token/s\r\n\r\n## Speed Tests and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [x] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [x] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [x] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [x] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review and Merge Process\r\n\r\n1. Ping Merge Oncalls to start the process. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [COD", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/models/glm4_moe.py"], "commit_sha": "9ffc0cc67e", "date_fixed": "2026-04-28T01:08:19Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-047", "title": "[NPU]Fix support_triton bug", "category": "perf_regression", "severity": 1, "confidence": 0.9, "root_cause": "support_triton function incorrectly disables triton for compute_position on NPU, causing fallback to slower native torch path and MTP performance regression", "rationale": "PR describes support_triton bug where compute_position does not use triton on NPU despite triton being available, causing MTP performance degradation. Before/after benchmark screenshots confirm performance improvement.", "pr_number": 23604, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23604", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nFix support_triton bug, which impacts MTP performance. ‘compute_position’ should use triton.\r\n\r\n## Modifications\r\n\r\nFix support_triton bug, which impacts MTP performance. ‘compute_position’ should use triton.\r\n\r\n## Accuracy Tests\r\n\r\n<img width=\"787\" height=\"100\" alt=\"image\" src=\"https://github.com/user-attachments/assets/f8456592-3b07-4891-9171-4da972a115d0\" />\r\n## Speed Tests and Profiling\r\n\r\nbefore:\r\n<img width=\"792\" height=\"487\" alt=\"image\" src=\"https://github.com/user-attachments/assets/ab1160ac-892a-4195-a9c5-69e9bd621003\" />\r\n\r\nafter:\r\n<img width=\"498\" height=\"471\" alt=\"image\" src=\"https://github.com/user-attachments/assets/f6a4791e-814a-4ebe-a9e7-b643f451380e\" />\r\n\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review and Merge Process\r\n\r\n1. Ping Merge Oncalls to start the process. See the [PR Merge Process](https://github.com/sgl-project/sglang/blo", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/utils/common.py"], "commit_sha": "7d49564431", "date_fixed": "2026-04-26T13:34:57Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-049", "title": "[diffusion] Fix --warmup-resolutions hang with --enable-cfg-parallel", "category": "crash", "severity": 10, "confidence": 0.8, "root_cause": "Synthesized warmup Req objects with guidance_scale=1.0 cause do_classifier_free_guidance=False in CFG-parallel mode, rank1 returns None noise_pred, TypeError at scheduler.step() caught inside GPUWorker causes 30-minute gloo broadcast timeout", "rationale": "PR describes a 30-minute silent hang when --enable-cfg-parallel and --warmup-resolutions are used together. Root cause: Scheduler.prepare_server_warmup_reqs creates Req with default SamplingParams (guidance_scale=1.0), Req.validate leaves do_cfg=False, CFG-parallel rank1 returns None noise_pred, scheduler.step() crashes with TypeError on operand, exception caught inside GPUWorker, surfaces only as dist broadcast timeout. Fix adds cfg_scale override in warmup Reqs and input validation.", "pr_number": 23198, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/23198", "pr_body": "## Summary\n\nFixes a 30-minute silent hang when SGLang-diffusion is launched with `--enable-cfg-parallel --warmup --warmup-resolutions <list>`. The synthesized warmup `Req`s were built with `Req(prompt=\"\", negative_prompt=\"\", ...)`, which auto-created a base `SamplingParams` with `guidance_scale=1.0`. `Req.validate()` left `do_classifier_free_guidance=False`, so in CFG-parallel mode rank 1 skipped the positive pass, returned `None` for `noise_pred`, and `scheduler.step()` crashed with:\n\n```\nTypeError: unsupported operand type(s) for *: 'Tensor' and 'NoneType'\n  at scheduling_flow_match_euler_discrete.py:537\n```\n\nThe exception was caught inside `GPUWorker`, `/health` kept returning 200, and the crash only surfaced as a 30-minute `gloo` broadcast timeout (`dist_timeout=3600`) when real requests arrived — turning a 7-second logic error into a half-hour silent hang.\n\n## Root cause chain\n\n1. `Scheduler.prepare_server_warmup_reqs` (`scheduler.py:238-258`) synthesizes `Req(prompt=\"\", negative_prompt=\"\")` with no `sampling_params` argument.\n2. `Req.__init__` (`schedule_batch.py:169-182`) auto-creates a **base** `SamplingParams()` (not the model-specific subclass) on the first `setattr` of a SamplingParams field. Base defaults include `guidance_scale=1.0`.\n3. `Req.validate` (`schedule_batch.py:270-285`) only sets `do_classifier_free_guidance=True` when `cfg_scale > 1.0 AND negative_prompt is not None`. With `cfg_scale=1.0`, the flag stays `False`.\n4. `_predict_noise_with_cfg` (`denoising.py:1596-1621`) returns `noise_pred_cond=None` on `cfg_rank != 0` when `do_cfg=False`.\n5. `scheduler.step(model_output=None)` crashes at `prev_sample = sample + dt * model_output` in `scheduling_flow_match_euler_discrete.py:537`.\n\n## Repro\n\n```bash\nsglang serve --model-path Qwen/Qwen-Image-2512 --num-gpus 2 \\\n    --enable-cfg-parallel --warmup --warmup-resolutions 512x512 1024x1024 \\\n    --enable-torch-compile --trust-remote-code\n# Hangs ~30 min, then scheduler terminates with:\n#   Error recei", "pr_labels": ["npu", "run-ci", "diffusion"], "files_fixed": ["python/sglang/multimodal_gen/runtime/managers/scheduler.py", "python/sglang/multimodal_gen/runtime/pipelines_core/stages/input_validation.py", "python/sglang/multimodal_gen/test/unit/test_cfg_parallel_warmup.py"], "commit_sha": "3c5b1f0810", "date_fixed": "2026-04-23T05:39:20Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-051", "title": "[NPU] fix qwen3.5 video processor", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "Qwen3VLVideoProcessor permute operation with >8 dimensions raises CANN runtime error on NPU (limited evidence: PR body focuses on symptom, exact CANN op not specified)", "rationale": "Qwen3.5 video processor fails on NPU because transformers' Qwen3VLVideoProcessor._process performs permute with >8 dimensions which is unsupported on NPU CANN runtime. Fix overrides _process to avoid processing data with >8 dimensions, following pattern from PR #20189. Before: 'Execution failed', After: successful video description response.", "pr_number": 22266, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/22266", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\nIn the Qwen3VLVideoProcessor, there is a permute operation with more than 8 dimensions which is not supported on the NPU. Following PR #20189 , this PR applies a patch to the Qwen3VLVideoProcessor in the transformers to avoid processing data with more than 8 dimensions.\r\n\r\n## Modifications\r\nOverride the _process function in Qwen3VLVideoProcessor to avoid processing of data with more than 8 dimensions.\r\n\r\n## Accuracy Tests\r\n```\r\nimport requests\r\n\r\nurl = f\"http://localhost:30000/v1/chat/completions\"\r\n\r\ndata = {\r\n    \"model\": \"/home/weights/Qwen3.5-4B\",\r\n    \"messages\": [\r\n        {\r\n            \"role\": \"user\",\r\n            \"content\": [\r\n                {\"type\": \"text\", \"text\": \"What’s in this video?\"},\r\n                {\r\n                    \"type\": \"video_url\",\r\n                    \"video_url\": {\r\n                        \"url\": \"https://huggingface.co/datasets/raushan-testing-hf/videos-test/resolve/main/sample_demo_1.mp4\"\r\n                    },\r\n                },\r\n            ],\r\n        }\r\n    ],\r\n    \"max_tokens\": 1000,\r\n}\r\n\r\nresponse = requests.post(url, json=data)\r\nprint(response.text)\r\n```\r\nNPU\r\n\r\n- before this PR:\r\nExecution failed\r\n- after this PR:\r\n_The user wants me to describe the video content.\\n\\n1.  **Identify the main subject:** A baby with very thin, blonde hair.\\n2.  **Identify the accessories:** The baby is wearing dark, thick-rimmed glasses, almost like shades, though it looks like a pair of frames on the head/nose area.\\n3.  **Identify the action:** The baby is sitting on a bed or floor, holding a large book. The baby repeatedly turns the pages of the book, flipping them fast. It looks almost like a fan or a drum.\\n4.  **Identify the setting:** There's a crib in the backgrou", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/modules/qwen_vl_processor.py"], "commit_sha": "33c9cc8994", "date_fixed": "2026-04-08T13:13:29Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-057", "title": "[NPU] [Bugfix] [diffusion] Fix NZ performance bug for diffusion models", "category": "perf_regression", "severity": 1, "confidence": 0.7, "root_cause": "NPU NZ format conversion for CPU-offloaded tensors not supported; torch.npu.config.allow_internal_format incorrectly enabled for non-quantized diffusion models causing hidden performance regression (limited evidence: PR body describes symptoms but not CANN-level mechanism)", "rationale": "Two NPU-specific bugfixes for diffusion models: (1) NZ format conversion for CPU-offloaded tensors is unsupported on NPU — changed from attempted conversion to warning message since the workaround is non-functional; (2) torch.npu.config.allow_internal_format=True is incorrectly enabled for non-quantized models, reducing performance even without NZ conversion calls (not caught by CI since warmup masks the issue). Both changes restore expected diffusion performance on NPU.", "pr_number": 20684, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/20684", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nFix of https://github.com/sgl-project/sglang/issues/20533 and https://github.com/sgl-project/sglang/issues/20682. Thanks to Geng Jinsong and Zhou Yiwen for bugs found!\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n- Changed conversion to NZ for offloaded tensors to Warning message (because CPU conversion is not supported now, and this workaround is not working). \r\n- Fixed performance for non-quantized diffusion models by adding an additional check when enabling ```torch.npu.config.allow_internal_format = True```, since its behavior in this case is incorrect and reduces performance even if there is no call to convert to NZ. (This case is also not covered by CI, since the performance does not change when warmup is enabled).\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\nNo influence\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\nReturned to the old values, as a bug was fixed\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [x] Provide accuracy and speed benchmark resu", "pr_labels": ["run-ci", "diffusion"], "files_fixed": ["python/sglang/multimodal_gen/runtime/loader/fsdp_load.py", "python/sglang/srt/hardware_backend/npu/utils.py"], "commit_sha": "09f5097fe4", "date_fixed": "2026-03-17T18:23:10Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-059", "title": "[NPU][Bug fix] context parallel bug fix", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "cp_split_and_rebuild_position split size calculation does not match actual CP split positions on NPU, causing RuntimeError/assertion error", "rationale": "NPU context parallel functionality is broken because cp_split_and_rebuild_position function's split size calculation doesn't match the actual position split boundaries. PR indicates 'An error is reported when the NPU enables the CP function' — this is a crash (RuntimeError/assertion). Per audit rule: NPU-specific crashes are still crash, not compatibility.", "pr_number": 19820, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/19820", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nAn error is reported when the NPU enables the CP function, the cp_split_and_rebuild_position function reports an error when the split size is not matched.\r\n\r\n## Modifications\r\n\r\nThe current positions where the cp code is split have changed.\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review Process\r\n\r\n1. Ping Merge Oncalls to start the PR flow. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/sglang/blob/main/.github/CODEO", "pr_labels": ["deepseek", "npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/modules/deepseek_v2_attention_mla_npu.py"], "commit_sha": "9b2e5526fb", "date_fixed": "2026-03-10T06:43:50Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-060", "title": "[NPU] bugs fix: fix a condition bug when using speculative inference on Qwen3 and Qwen3 moe ", "category": "perf_regression", "severity": 1, "confidence": 0.9, "root_cause": "forward_mode.is_extend() condition blocks fused split_qkv_rmsnorm_rope kernel during speculative decode because TARGET_VERIFY forward mode also returns is_extend()=True, making condition always-true during decode", "rationale": "PR #17511 added forward_mode.is_extend() guard to avoid using fused triton split_qkv_rmsnorm_rope kernel during prefill stage. However, during speculative inference (eagle3), the decode stage uses TARGET_VERIFY forward mode where is_extend() returns True, causing the condition to always evaluate as True and permanently disabling the fusion kernel during decode. Fix changes condition to forward_mode.is_extend_or_draft_extend_or_mixed() to correctly identify only prefill/extend stages.", "pr_number": 19532, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/19532", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nThe previous PR [17511](https://github.com/sgl-project/sglang/pull/17511)  added a condition ( forward_mode.is_extend() ) to avoid using fused Triton kernel (split_qkv_rmsnorm_rope) during prefill stage. However, when using speculative inference (such as eagle3)，the condition will become invalid because the decode stage will be TARGET_VERIFY, and forward_mode.is_extend() will always be true. This will make the fusion kernel  unusable the decode phase.\r\n\r\n## Modifications\r\n\r\nChange the condition from  forward_mode.is_extend()  to forward_mode.is_extend_or_draft_extend_or_mixed().\r\n\r\n## Accuracy Tests\r\n\r\n\r\n## Benchmarking and Profiling\r\n\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review Process\r\n\r\n1. Ping Merge Oncalls to start the PR flow. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/models/qwen3.py", "python/sglang/srt/models/qwen3_moe.py"], "commit_sha": "365ca1edb5", "date_fixed": "2026-03-03T09:59:25Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-061", "title": "[NPU] bugs fix for Deepseek models", "category": "precision_loss", "severity": 3, "confidence": 0.9, "root_cause": "Wrong config key name 'quant_config' instead of 'quantization_config' in mla_preprocess.py causes MLAPO feature to silently fail, producing unquantized output when quantized was requested. DT_UINT64 bootstrap_room crash referenced is fixed by separate PR #19423 and not addressed in this PR.", "rationale": "Config key typo (quant_config vs quantization_config) prevents MLAPO quantization from being applied when SGLANG_NPU_USE_MLAPO=1 is set. PR says 'this feature does not work' not 'crashes' — the model runs without quantization, producing wrong output silently. The DT_UINT64 crash was already fixed by a separate PR. The performance improvement in schedule_policy.py is not a bug fix. Category changed from crash to precision_loss (wrong output without crash). Severity 3 retained (precision_loss + sev=3 is correct per audit rules: Major function error/precision loss).", "pr_number": 19544, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/19544", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nWhen we run DeepSeek V3.1 and DeepSeek V3.2 models on Ascend NPU devices, we encounter three issues. \r\n1.  when we export SGLANG_NPU_USE_MLAPO=1, this feature does not work.\r\n2. The error message is `Tensor self not implemented for DT_UINT64`.  It is about the data type of `bootstrap_room` in utils.py. \r\n<img width=\"1050\" height=\"68\" alt=\"image\" src=\"https://github.com/user-attachments/assets/70428364-10b2-47a7-8f5c-3444df53c365\" />\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\nTo fix three bugs: \r\n1. We corrected the  config name from `quant_config` to` quantization_config` in mla_preprocess.py, so when we export SGLANG_NPU_USE_MLAPO=1, this feature can work.\r\n2. The bug about data type of `bootstrap_room` in utils.py is fixed by `https://github.com/sgl-project/sglang/pull/19423`.\r\nIn addition，we reordered a `prefill_delayer_single_pass` check in the scheduling policy to enable an earlier exit and improve performance.\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations]", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/attention/mla_preprocess.py", "python/sglang/srt/managers/schedule_policy.py"], "commit_sha": "b7f13a7b73", "date_fixed": "2026-02-28T09:26:15Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-062", "title": "[NPU] bugfix: resolve modelslim load weights bug", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "Redundant language_model replace operation in modelslim.py breaks quantized weight loading for Qwen3.5, preventing service startup", "rationale": "Service cannot start with modelslim quantization on Qwen3.5 due to duplicate language_model prefix handling in modelslim.py. Current rationale describes 'silent_corruption' but PR explicitly says 'service cannot be started' — this is a startup crash, not silent corruption. Severity reduced from 4 to 3 (startup crash, not silent data corruption).", "pr_number": 19472, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/19472", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\nBased on the Qwen3.5 model, some bugs exist in the modelslim quantization scenario. As a result, the service cannot be started.\r\nBefore fix:\r\n<img width=\"1442\" height=\"49\" alt=\"image\" src=\"https://github.com/user-attachments/assets/e1d011e5-0afb-43f1-a76e-5312eb0dfe84\" />\r\nAfter fix:\r\n<img width=\"679\" height=\"34\" alt=\"image\" src=\"https://github.com/user-attachments/assets/fb5358c1-5906-475f-becf-5e3657537b39\" />\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\n## Modifications\r\npython/sglang/srt/layers/quantization/modelslim/modelslim.py\r\nThe language_model field has been added to the prefix file in qwen3_vl.py(PR #18926). do not need to add the replace operation of language_model to the modelslim.py file. \r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Accuracy Tests\r\nNA\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_gu tream cannot be properly closed on NPU, causing crashes in some cases; torch.compile(dynamic=True) backend not working on NPU for DSV3.2", "rationale": "Two NPU-specific runtime bugs on DSV3.2: nas_Indexer dual stream cannot be closed (causes crash), torch.compile(dynamic=True) backend incompatible with NPU (compile-time/runtime error). Both are NPU-specific crashes per audit rules.", "pr_number": 18553, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/18553", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nFix two bugs on dsv32 when infering on npu\r\n\r\n## Modifications\r\n\r\n1. fix a bug: forward_npu method of nas_Indexer has a dual stream feature that can not be closed. May cause problem in some cases. \r\n2. @torch.compile(dynamic=True, backend=get_compiler_backend()) decorator do not working on npu. \r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang
