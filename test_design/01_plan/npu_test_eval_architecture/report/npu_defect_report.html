add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review Process\r\n\r\n1. Ping Merge Oncalls to start the PR flow. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/sglang/blob/main/.github/CODEOWNERS) and other reviewers.\r\n3. Trigger CI tests with [comments](https://docs.sglang.io/developer_gui", "pr_labels": [], "files_fixed": ["python/sglang/srt/disaggregation/utils.py"], "commit_sha": "97f1fa5e6b", "date_fixed": "2026-02-26T13:10:50Z", "source": "pr", "needs_review": false, "audit_count": 6}, {"bug_id": "BUG-2026-110", "title": "[NPU] Fix a corner case where FusedMoE.top_k is not explicitly declared", "category": "crash", "severity": 10, "confidence": 0.9, "root_cause": "FusedMoE.top_k is None for models like Llama4, OLMoE where top_k is not set during init, causing TypeError crash when accessed", "rationale": "FusedMoE.top_k is None for models like Llama4, OLMoE where top_k is not explicitly set during init. Causes TypeError crash when top_k is accessed. Fix extracts top_k from topk_ids.shape[1]. Edge case for models with implicit top_k.", "pr_number": 19287, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/19287", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nFor some models (e.g. Llama 4, OLMoE), `top_k`s are not set when initializing FusedMoE, leading to a TypeError as follows:\r\n\r\n![topk](https://github.com/user-attachments/assets/3da77802-26e9-4bcf-9292-de6dd95d159b)\r\n\r\nThis pr aims to solve this issue by extracting `top_k` info from `topk_ids` when `FusedMoE.top_k` is `None`.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n- Use `topk_ids.shape[1]` as `top_k` when `layer.top_k` is not set\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\nshould be covered by CI\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\nN/A\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [x] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [x] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [x] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [x] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/cont", "pr_labels": ["quant", "run-ci"], "files_fixed": ["python/sglang/srt/layers/quantization/unquant.py"], "commit_sha": "cdc411160b", "date_fixed": "2026-02-25T12:49:59Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-117", "title": "[NPU] Bug fix in device detect", "category": "crash", "severity": 10, "confidence": 0.92, "root_cause": "NPU device detection (is_npu()) returns False when RL frameworks such as Ray/verl control ASCEND_RT_VISIBLE_DEVICES environment variable", "rationale": "When RL frameworks like Ray/verl control the ASCEND_RT_VISIBLE_DEVICES environment variable, the is_npu() function can incorrectly return False even though NPU devices are available. This causes SGLang to take the CUDA code path, leading to crashes on NPU hardware. The fix adds a user-facing warning when hasattr(torch, 'npu') is True but torch.npu.is_available() returns False.", "pr_number": 14137, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/14137", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n1. Ray in RL framework like verl will control environment variable such as ASCEND_RT_VISIBLE_DEVICES, which sometimes will cause original is_npu() function return False in sglang. Then code will go to cuda branch again\r\n## Modifications\r\n1. Remind user in case of hasattr(torch, \"npu\") =True and torch.npu.is_available()=False.\r\n\r\n", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/utils/common.py"], "commit_sha": "2fb3160598", "date_fixed": "2025-12-24T16:18:39Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-118", "title": "[NPU]Fix for ipc handle with npu", "category": "crash", "severity": 10, "confidence": 0.9, "root_cause": "NPU does not support UUID for IPC tensor handles, causing RuntimeError in torch_npu multiprocessing reductions", "rationale": "NPU's torch_npu does not support UUID for IPC tensor reconstruction, unlike CUDA. This causes RuntimeError 'Blocked unsafe class loading (torch_npu.multiprocessing.reductions.rebuild_npu_tensor)' during multiprocessing. The fix addresses IPC handle serialization for NPU in model_runner.py and patch_torch.py.", "pr_number": 14138, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/14138", "pr_body": "coauthor @lbk-sys \r\n## Motivation\r\nCurrently, NPU does not support UUID.  This will cause RuntimeError: Blocked unsafe class loading (torch_npu.multiprocessing.reductions.rebuild_npu_tensor)\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n\r\n", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/model_executor/model_runner.py", "python/sglang/srt/utils/patch_torch.py"], "commit_sha": "2c5a446006", "date_fixed": "2025-12-19T14:39:05Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-120", "title": "[NPU] fix for NPU memory settings logic", "category": "compatibility", "severity": 3, "confidence": 0.9, "root_cause": "NPU memory default settings processed through generic GPU memory settings handler causing incorrect branch selection (npu_memory_settings_branching)", "rationale": "NPU memory default settings were processed in the generic _handle_gpu_memory_settings chain, which could cause issues when memory configuration does not fall into the expected branch. The fix extracts NPU-specific memory settings into a dedicated set_default_server_args function in npu/utils.py that precisely controls based on available NPU memory, and processes hardware-specific backend settings before the general handler.", "pr_number": 15258, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/15258", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nPreviously the processing logics of npu memory settings sit in `_handle_gpu_memory_settings` processing chain, which could cause issues if mem doesn't fall into the correct branch we expected. In this PR these default settings are extracted into npu's specific `set_default_server_args` function that controls precisely based on current available npu memory.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n- Extract out npu memory settings into npu's specific `set_default_server_args` function\r\n- Process hardware-specific backend settings before general settings handler\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\nnot affected\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\nnot affected\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [x] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contri", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/utils.py", "python/sglang/srt/server_args.py"], "commit_sha": "71cb90378b", "date_fixed": "2025-12-17T01:04:22Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-121", "title": "[NPU] bug fix for multi stream", "category": "compatibility", "severity": 3, "confidence": 0.75, "root_cause": "MTP multi-stream optimization incompatible with NPU, causing errors requiring revert (limited evidence)", "rationale": "Multi-stream optimization for MTP (Multi-Token Prediction) on DeepSeek models causes errors on NPU hardware. The fix reverts the multi-stream implementation for NPU compatibility. Affects environ.py, deepseek_nextn.py, and deepseek_v2.py. Limited evidence from PR body (one-line description plus error screenshot).", "pr_number": 15048, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/15048", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<img width=\"1162\" height=\"506\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c63fe802-c056-49a8-adc3-9becdc9ffbe7\" />\r\n\r\n## Modifications\r\n\r\nrevert mtp multi stream\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n- [ ] Work with maintainers to merge your PR. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process)\r\n", "pr_labels": ["deepseek", "run-ci"], "files_fixed": ["python/sglang/srt/environ.py", "python/sglang/srt/models/deepseek_nextn.py", "python/sglang/srt/models/deepseek_v2.py"], "commit_sha": "4ea3642250", "date_fixed": "2025-12-14T08:38:12Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-122", "title": "[BugFix] fix prefixcache performance and accuracy on ascend", "category": "precision_loss", "severity": 3, "confidence": 0.9, "root_cause": "slow CPU-device transfer pattern for device_indices in cache_controller.py and missing npu_ring_mla operator integration for segmented MLA attention computation on Ascend", "rationale": "PR has two parts: (1) performance — device_indices moved to CPU in advance to avoid slow device access, NEED_HOST_REGISTER flag added in memory_pool_host.py to skip cudaHostRegister when not needed; (2) accuracy — npu_ring_mla operator integrated for segmented MLA attention computation. Current rationale about apply_rope_with_cos_sin_cache_inplace not supporting fp32 input is a complete hallucination unsupported by the PR body.", "pr_number": 13573, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/13573", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nWe have fixed some performance and accuracy problems in the MLA model on Ascend.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\nFor performance problems:\r\n\r\n1. We moved **device_indices** to the CPU in advance in *cache_controller.py*.\r\n2. In *memory_pool_host.py*, we added a new variable **NEED_HOST_REGISTER** and **self.host_register** to indicate whether **cudaHostRegister** is required for pinning memory. If it is not needed, tensors are allocated directly with **pin_memory=True**.\r\n\r\nFor accuracy problems:\r\n\r\n- We integrated the **npu_ring_mla** operator to perform segmented computation for the attention module.\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\nWe added a new test case, *test_ascend_hicache_mla.py*, to ensure the accuracy of the MLA model. The testing results are consistent with those obtained when the feature is disabled, indicating that the accuracy is normal.\r\nTest case results:\r\n<img width=\"344\" height=\"84\" alt=\"image\" src=\"https://github.com/user-attachments/assets/22e52a66-11bf-4926-b055-1ecb2a8c415c\" />\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\nWe tested the performance of the DeepSeek v3 model by comparing disabling the radix cache versus enabling L1 and L2 caches. The dataset used was 3.5K GSM8K with a 50% reuse rate (half of the requests are repeated), which ultimately **reduced TTFT by 39.5%**. Below are the specific execution and benchmark commands.\r\n\r\nFirst ", "pr_labels": ["deepseek", "hicache", "npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/attention/ascend_backend.py", "python/sglang/srt/managers/cache_controller.py", "python/sglang/srt/mem_cache/memory_pool_host.py", "test/srt/ascend/test_ascend_hicache_mla.py", "test/srt/run_suite.py"], "commit_sha": "948b6acee8", "date_fixed": "2025-12-07T18:16:20Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-123", "title": "[Ascend] fix AscendAttnMaskBuilder bug to support float16 models", "category": "precision_loss", "severity": 3, "confidence": 0.85, "root_cause": "AscendAttnMaskBuilder.generate_attn_mask missing float16 dtype handling, causing incorrect attention mask generation for float16 models on Ascend", "rationale": "AscendAttnMaskBuilder failed to handle float16 dtype, causing incorrect attention mask generation for float16 models on Ascend. The fix modifies generate_attn_mask to cast/adapt for float16. Root cause is missing dtype handling (format_cast) in the mask builder.", "pr_number": 14271, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/14271", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\n<!-- Describe the purpose and goals of this pull request. -->\r\nThe `AscendAttnMaskBuilder ` class implements a system for generating, caching, and updating attention masks. However, there is a bug when using this class with Ascend devices and a model configured with the `float16` data type. This pull request can fix the bug.\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\nModify the `generate_attn_mask` fuction in the `AscendAttnMaskBuilder ` class.\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n- [ ] Work with maintainers to merge your PR. See ", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/layers/attention/ascend_backend.py"], "commit_sha": "443d7bcd83", "date_fixed": "2025-12-03T11:37:17Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-128", "title": "[NPU] fix pp_size>1", "category": "compatibility", "severity": 3, "confidence": 0.85, "root_cause": "hardcoded .cuda() and torch.cuda calls in pipeline parallelism distributed code causing RuntimeError on NPU; replaced with torch.get_device_module() and .to() for device-agnostic behavior, plus AscendTokenToKVPool creation parameter fix", "rationale": "Pipeline parallelism (pp_size>1) completely broken on NPU due to hardcoded .cuda() calls. Replaced with torch.get_device_module() and .to() for device-agnostic behavior. Also fixed AscendTokenToKVPool creation. Root cause: CANN API incompatibility -- hardcoded CUDA-specific API calls instead of using the device module abstraction.", "pr_number": 12195, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/12195", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\n\r\nPipeline parallelizm is an one of the options for run model on multiple devices.\r\nSome functions have hardcoded `.cuda` which causes errors on other devices\r\n\r\n## Modifications\r\n\r\nadded actual values for `AscendTokenToKVPool` creation\r\nreplaced `torch.cuda` with actual `torch.get_device_module()`\r\nreplaced `.cuda` with `.to`\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Benchmarking and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [x] Format your code according to the [Format code with pre-commit](https://docs.sglang.ai/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.ai/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.ai/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.ai/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.ai/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/distributed/parallel_state.py", "python/sglang/srt/mem_cache/memory_pool.py", "python/sglang/srt/model_executor/model_runner.py", "python/sglang/srt/utils/common.py"], "commit_sha": "8e2ac2e628", "date_fixed": "2025-10-30T03:18:37Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2025-138", "title": "[Bug fix] Fix ascend mla in aclgraph", "category": "crash", "severity": 10, "confidence": 0.88, "root_cause": "autocontiguous bug in mla operator within aclgraph mode on Ascend NPU, causing RuntimeError and kernel launch failure for DeepSeek-R1-0528 with batch>1; fix manually calls .contiguous() on query input", "rationale": "DeepSeek-R1-0528 inference fails with batch>1 on Ascend NPU in aclgraph mode. The mla operator autocontiguous fails within captured graph. Fix requires manually making query contiguous. Only manifests in graph capture mode on Ascend.", "pr_number": 9925, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/9925", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.ai to discuss further. -->\r\n\r\n## Motivation\r\nFix inference of DeepSeek-R1-0528 with batch > 1 on Ascend devices\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\n## Modifications\r\nmanually contiguous query input to avoid autocontiguous bug of mla operator in aclgraph mode\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Error Log\r\n```\r\n  File \"/home/miniconda3/envs/hzh_sglang/lib/python3.11/site-packages/torch_npu/npu/graphs.py\", line 75, in graph_task_update_end\r\n  File \"/home/miniconda3/envs/hzh_sglang/lib/python3.11/threading.py\", line 982, in run\r\n    _graph_task_update_end(stream)\r\nRuntimeError: The Inner error is reported as above. The process exits for this inner error, and the current working operator name is aclnnFusedInferAttentionScoreV3.\r\nSince the operator is called asynchronously, the stacktrace may be inaccurate. If you want to get the accurate stacktrace, please set the environment variable ASCEND_LAUNCH_BLOCKING=1.\r\nNote: ASCEND_LAUNCH_BLOCKING=1 will force ops to run in synchronous mode, resulting in performance degradation. Please unset ASCEND_LAUNCH_BLOCKING in time after debugging.\r\n[ERROR] 2025-09-02-15:23:31 (PID:67556, Device:2, RankID:-1) ERR00100 PTA call acl api failed.\r\nEZ9903: [PID: 67556] 2025-09-02-15:23:31.178.230 rtKernelLaunchWithHandleV2 failed: 207000\r\n        Solution: In this scenario, collect the plog when the fault occurs and locate the fault based on the plog.\r\n        TraceBack (most recent call last):\r\n        Check kernel task failed, stream_id=10, task_id=45, retCode=0x702001d.[FUNC:LaunchKernelWithHandle][FILE:context.cc][LINE:1387]\r\n        rtKernelLaunchWithHandleV2 execute failed, reason=[driver error:feature not support][FUNC:FuncErrorReason][FILE:error_message", "pr_labels": [], "files_fixed": ["python/sglang/srt/layers/attention/ascend_backend.py"], "commit_sha": "8085aca791", "date_fixed": "2025-09-08T16:49:44Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-002", "title": "【NPU】【bugfix】fix server error when mtp unquant", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "Broken dispatch path in unquantized MTP models causes server error when MTP is used without quantization", "rationale": "Clear server crash when MTP is used with unquantized models. The dispatch path for this specific combination was never wired up. A regression test exercising MTP + unquantized weights would catch it. Confidence is high because the fix target is well-defined (dispatch routing).", "pr_number": 26389, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/26389", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nOn NPU , the main model and draft model sometimes adapt different quantization schemes.With the ongoing refactoring of DeepEP, the environment variables for MTP quantization are currently affecting the main model incorrectly.\r\n\r\n## Modifications\r\n\r\npython/sglang/srt/layers/moe/token_dispatcher/deepep.py\r\npython/sglang/srt/models/deepseek_nextn.py\r\npython/sglang/srt/models/qwen3_5_mtp.py\r\npython/sglang/srt/models/qwen3_next_mtp.py\r\n\r\n## Accuracy Tests\r\n\r\n\r\n\r\n## Speed Tests and Profiling\r\n\r\nstart command\r\n```\r\n# high performance cpu\r\necho performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor\r\nsysctl -w vm.swappiness=0\r\nsysctl -w kernel.numa_balancing=0\r\nsysctl -w kernel.sched_migration_cost_ns=50000\r\n# bind cpu\r\nexport SGLANG_SET_CPU_AFFINITY=1\r\n\r\nunset https_proxy\r\nunset http_proxy\r\nunset HTTPS_PROXY\r\nunset HTTP_PROXY\r\nunset ASCEND_LAUNCH_BLOCKING\r\n# cann\r\nsource /usr/local/Ascend/ascend-toolkit/set_env.sh\r\nsource /usr/local/Ascend/nnal/atb/set_env.sh\r\n\r\nexport STREAMS_PER_DEVICE=32\r\nexport SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT=600\r\nexport SGLANG_ENABLE_SPEC_V2=1\r\nexport SGLANG_ENABLE_OVERLAP_PLAN_STREAM=1\r\n# export SGLANG_NPU_USE_MULTI_STREAM=1\r\nexport HCCL_BUFFSIZE=1000\r\nexport HCCL_OP_EXPANSION_MODE=AIV\r\nexport HCCL_SOCKET_IFNAME=lo\r\nexport GLOO_SOCKET_IFNAME=lo\r\n\r\n\r\nMODEL_PATH=/home/weights/GLM-5.1-w4a8\r\nexport PYTHONPATH=/home/***/glm/sglang_5_26_fix_mtp_unquant/sglang/python:$PYTHONPATH\r\n\r\n\r\npython3 -m sglang.launch_server \\\r\n        --model-path $MODEL_PATH \\\r\n        --attention-backend ascend \\\r\n        --device npu \\\r\n        --tp-size 16 \\\r\n        --nnodes 1 \\\r\n        --dp-size 1 \\\r\n        --enable-dp-attention \\\r\n        --chunked-prefill-size 131072 \\\r\n     ", "pr_labels": ["deepseek", "npu", "run-ci"], "files_fixed": ["python/sglang/srt/layers/moe/token_dispatcher/deepep.py", "python/sglang/srt/models/deepseek_nextn.py", "python/sglang/srt/models/qwen3_5_mtp.py", "python/sglang/srt/models/qwen3_next_mtp.py", "test/registered/ascend/basic_function/parallel_strategy/expert_parallelism/test_npu_deepep.py"], "commit_sha": "b421e60eed", "date_fixed": "2026-05-30T12:01:20Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-004", "title": "[Bugfix] Fix Ascend NPU CP attention for batch size > 1", "category": "crash", "severity": 10, "confidence": 0.85, "root_cause": "Removed scalar fields (actual_seq_q_prev, etc.) in ContextParallelMetadata cause AttributeError crash in NPU CP attention path (bs>=1); additionally, incorrect torch.chunk split produces wrong attention output for bs>1", "rationale": "Dual-aspect bug: (a) AttributeError crash when accessing removed scalar metadata fields breaks all bs CP on NPU — crash, sev=10 per crash+sev3→10 rule; (b) torch.chunk(q,2) instead of split at total_q_prev_tokens causes wrong attention for bs>1 — precision_loss aspect. Primary classification crash because program terminates with AttributeError for all CP users on NPU.", "pr_number": 26705, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/26705", "pr_body": "## Motivation\r\n\r\n#23269 generalized attention context-parallel (CP) prefill from `bs == 1` to `bs > 1` by reshaping `ContextParallelMetadata` from single scalars into per-sequence lists/tensors. That change updated the CUDA FlashAttention path and the DSA indexer, but **missed the Ascend NPU FIA CP path** in `do_cp_attn_fia`. As a result, on NPU the CP-extend (prefill) attention now:\r\n\r\n1. **Raises `AttributeError`** — it still reads the removed scalar fields `cp_meta.actual_seq_q_prev / actual_seq_q_next / kv_len_prev / kv_len_next`, which no longer exist on the new `ContextParallelMetadata` (only `*_list` / `*_tensor` / `total_q_prev_tokens` remain). This breaks even `bs == 1` CP on NPU on current main.\r\n2. **Splits Q incorrectly for `bs > 1`** — it uses `torch.chunk(q, 2)` (global midpoint), but under the zigzag layout the local tokens are `[all_seqs_prev_blocks | all_seqs_next_blocks]`, so the split point is `total_q_prev_tokens`, not `len(q) // 2`.\r\n\r\nThis PR restores the Ascend NPU CP attention path so Qwen3-MoE (and other non-MLA GQA models on the FIA path) work end-to-end with `--enable-prefill-context-parallel` for `bs > 1`, matching the community bs>1 design from #23269.\r\n\r\nAffected path is reached only when `ASCEND_USE_FIA=1`, the attention backend is `ascend`, and a pure CP-extend prefill batch is scheduled. MLA and the DSA/NSA path (`do_cp_balance_attn`) are out of scope (the DSA CP path remains bs=1 in #23269) and are not touched.\r\n\r\n## Modifications\r\n\r\n`python/sglang/srt/hardware_backend/npu/attention/ascend_backend.py`, method `do_cp_attn_fia`:\r\n\r\n- Split Q at `cp_meta.total_q_prev_tokens` (`q[:split]` / `q[split:]`) instead of `torch.chunk(q, 2)`, so the prev/next halves match the per-sequence zigzag layout for `bs > 1`. (`torch.chunk` happened to be correct only for `bs == 1`.)\r\n- Replace the removed scalar metadata fields in the two `npu_fused_infer_attention_score` calls with the per-sequence equivalents, aligned with the existing non-CP FIA conv", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/attention/ascend_backend.py"], "commit_sha": "fe4b29d391", "date_fixed": "2026-05-30T07:07:40Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-008", "title": "[Mamba] Fix extra_buffer overlap schedule races", "category": "precision_loss", "severity": 3, "confidence": 0.85, "root_cause": "Race conditions in extra_buffer overlap schedule in Mamba where concurrent buffer operations access overlapping memory regions without proper synchronization", "rationale": "Race conditions in buffer overlap scheduling can silently corrupt data. Hard to reproduce deterministically. Needs review because race fixes are subtle and may introduce new races. A stress test with concurrent Mamba operations would help catch it.", "pr_number": 24954, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/24954", "pr_body": "## Summary\r\nGoal: move all mamba state operations to forward stream to avoid scheduler <-> forward stream data manipulation races\r\n1. Fix `cache_unfinished_req`'s copy mamba state races with forward stream:  cache unfinished donate the index to the radix cache instead of copying, then alloc a new one for next iteration\r\n2. prefix match copy-on-write (cow) and mamba state clear both happen during init metadata instead of scheduler stream.\r\n\r\n## Testing\r\n- CI coverage is sufficient\r\n- Verified race-free fix with 0kl RL testing, context: https://github.com/sgl-project/sglang/issues/24221#issuecomment-4424945325\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n<!-- pr-states:start -->\n---\n### CI States\n\nLatest PR Test (Base): <!-- slot:pr-test:start -->:hourglass_flowing_sand: [Run #26070795722](https://github.com/sgl-project/sglang/actions/runs/26070795722)<!-- slot:pr-test:end -->\nLatest PR Test (Extra): <!-- slot:pr-test-extra:start -->:x: [Run #26070795696](https://github.com/sgl-project/sglang/actions/runs/26070795696)<!-- slot:pr-test-extra:end -->\n<!-- pr-states:end -->", "pr_labels": ["npu", "run-ci", "run-ci-extra"], "files_fixed": ["python/sglang/srt/layers/attention/hybrid_linear_attn_backend.py", "python/sglang/srt/managers/schedule_batch.py", "python/sglang/srt/mem_cache/hi_mamba_radix_cache.py", "python/sglang/srt/mem_cache/mamba_radix_cache.py", "python/sglang/srt/mem_cache/memory_pool.py", "python/sglang/srt/mem_cache/unified_cache_components/mamba_component.py", "python/sglang/srt/model_executor/forward_batch_info.py", "python/sglang/srt/speculative/eagle_info_v2.py"], "commit_sha": "862d39e06c", "date_fixed": "2026-05-19T04:13:21Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-009", "title": "[NPU] Fix TypeError in get_state_buf_infos when index_head_dim is None on MLA", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "TypeError in get_state_buf_infos when index_head_dim is None on MLA models on NPU, missing None guard", "rationale": "TypeError from unhandled None value causes crash. Clear fix target (add None check). A regression test with index_head_dim=None would catch it.", "pr_number": 25383, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/25383", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nIn PD disaggregation scenarios, NPUMLATokenToKVPool.get_state_buf_infos() unconditionally accesses self.index_k_buffer , which is initialized to None when the model has no index head (i.e., index_head_dim is None ), causing TypeError: 'NoneType' object is not subscriptable .\r\n\r\nThis issue was triggered by commit d7f4761a ([PD] Refactor hybrid state transfer), which added NPUMLATokenToKVPool to the isinstance check in setup_state_kv_args , causing get_state_buf_infos() to be invoked and exposing this previously uncovered null path.\r\n\r\nThe sibling methods get_contiguous_buf_infos and get_kv_size_bytes already guard with if self.index_head_dim is not None , but get_state_buf_infos was missing this check.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\nAdd a null guard at the beginning of NPUMLATokenToKVPool.get_state_buf_infos() : return empty lists ([], [], []) when self.index_head_dim is None , consistent with the other methods in the same class.\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n```bash\r\n# System Settings hello\r\necho performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor\r\nsysctl -w vm.swappiness=10\r\nsysctl -w kernel.numa_balancing=0\r\n\r\nexport PYTORCH_NPU_ALLOC_CONF=expandable_segments:True\r\nexport SGLANG_SET_CPU_AFFINITY=1\r\nexport STREAMS_PER_DEVICE=32\r\n\r\nexport DEEP_NORMAL_MODE_USE_INT8_QUANT=1\r\n\r\nP_IP=('ip0')\r\nD_IP=('ip1')\r\n\r\nLOCAL_HOST1=`hostname -I|awk -F \" \" '{print$1}'`\r\nLOCAL_HOST2=`hostname -I|awk -F \" \" '{print$2}'`\r\n\r\nexport ASCEND_MF_STORE_UR", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/memory_pool_npu.py"], "commit_sha": "d90bc65e30", "date_fixed": "2026-05-19T01:09:11Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-010", "title": "[NPU]fix:NPUMLATokenToKVPool object has no attribute \"kv_buffer\"", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "NPUMLATokenToKVPool class missing the kv_buffer attribute that the parent class or calling code expects", "rationale": "AttributeError crash on NPU. Missing attribute on the subclass. A regression test exercising NPU MLA token pool would catch it.", "pr_number": 25249, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/25249", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nThe NPUMLATokenToKVPool kv buffer is different from the MLATokenToKVPoo. Therefore, the load_cpu_copy and get_cpu_copy need to be override.\r\n\r\n\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\n## Accuracy Tests\r\n\r\n<!-- If this pull request affects model outputs (e.g., changes to the kernel or model forward code), provide accuracy test results. -->\r\n\r\n## Speed Tests and Profiling\r\n\r\n<!-- If this pull request impacts inference speed, provide benchmarking and profiling results. -->\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review and Merge Process\r\n\r\n1. Ping Merge Oncalls to start the process. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/sglang/blob/main/.github/CODEOWNERS) and", "pr_labels": ["npu", "run-ci"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/memory_pool_npu.py"], "commit_sha": "2a357071ec", "date_fixed": "2026-05-18T01:09:28Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-013", "title": "[Spec] Mamba scatter cleanup; fix multi-layer positional bug; dflash naming", "category": "precision_loss", "severity": 3, "confidence": 0.65, "root_cause": "Incorrect position indexing across multiple Mamba layers in speculative decoding, causing wrong draft token positions (limited evidence)", "rationale": "Multi-layer positional bug in Mamba spec decoding silently produces wrong draft tokens without crashing. An oracle test comparing draft output against a known-correct reference would catch it. Needs review because scatter/positional logic is subtle and the fix touches multiple layers.", "pr_number": 25029, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/25029", "pr_body": "Follow-up cleanup after the speculative internal rename PR. Stacks on #25014 — review only after that lands.", "pr_labels": ["blackwell", "npu"], "files_fixed": ["python/sglang/srt/hardware_backend/npu/attention/ascend_hybrid_linear_attn_backend.py", "python/sglang/srt/layers/attention/hybrid_linear_attn_backend.py", "python/sglang/srt/layers/attention/mamba/mamba_state_scatter_triton.py", "python/sglang/srt/observability/scheduler_metrics_mixin.py", "python/sglang/srt/speculative/dflash_info.py", "python/sglang/srt/speculative/dflash_utils.py", "python/sglang/srt/speculative/dflash_worker.py", "python/sglang/srt/speculative/eagle_worker.py", "python/sglang/srt/speculative/eagle_worker_v2.py", "python/sglang/srt/speculative/multi_layer_eagle_worker.py"], "commit_sha": "f526e3fa27", "date_fixed": "2026-05-12T03:36:50Z", "source": "pr", "needs_review": true, "audit_count": 5}, {"bug_id": "BUG-2026-017", "title": "[NPU] fix normal DeepEP mode num_tokens_per_rdma_rank error caused by none", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "NoneType error in DeepEP normal mode when num_tokens_per_rdma_rank is None, lacking a default or guard", "rationale": "Crash from None value propagating through DeepEP dispatch. Clear fix (handle None case). Regression test would catch it.", "pr_number": 22972, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/22972", "pr_body": "\r\n## Motivation\r\n\r\nIf `expert_distribution_recorder_mode = \"per_token\"`, attributeError is reported in the `on_deepep_dispatch_normal` method of the expert distribution recorder when the NPU is deployed on a single server.\r\n<img width=\"1082\" height=\"121\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c8c45531-3535-4579-af7c-244856adf610\" />\r\n\r\n## Modifications\r\n\r\nA check for the `None` value of `num_tokens_per_rdma_rank` is added to ensure that the RDMA parameter is correctly processed in the single-node environment.\r\n\r\n## Accuracy Tests\r\n\r\n\r\n## Speed Tests and Profiling\r\n\r\n\r\n## Checklist\r\n\r\n- [ ] Format your code according to the [Format code with pre-commit](https://docs.sglang.io/developer_guide/contribution_guide.html#format-code-with-pre-commit).\r\n- [ ] Add unit tests according to the [Run and add unit tests](https://docs.sglang.io/developer_guide/contribution_guide.html#run-and-add-unit-tests).\r\n- [ ] Update documentation according to [Write documentations](https://docs.sglang.io/developer_guide/contribution_guide.html#write-documentations).\r\n- [ ] Provide accuracy and speed benchmark results according to [Test the accuracy](https://docs.sglang.io/developer_guide/contribution_guide.html#test-the-accuracy) and [Benchmark the speed](https://docs.sglang.io/developer_guide/contribution_guide.html#benchmark-the-speed).\r\n- [ ] Follow the SGLang code style [guidance](https://docs.sglang.io/developer_guide/contribution_guide.html#code-style-guidance).\r\n\r\n## Review and Merge Process\r\n\r\n1. Ping Merge Oncalls to start the process. See the [PR Merge Process](https://github.com/sgl-project/sglang/blob/main/.github/MAINTAINER.md#pull-request-merge-process).\r\n2. Get approvals from [CODEOWNERS](https://github.com/sgl-project/sglang/blob/main/.github/CODEOWNERS) and other reviewers.\r\n3. Trigger CI tests with [comments](https://docs.sglang.io/developer_guide/contribution_guide.html#how-to-trigger-ci-tests) or contact authorized users to do so.\r\n   - Common commands", "pr_labels": ["run-ci"], "files_fixed": ["python/sglang/srt/eplb/expert_distribution.py"], "commit_sha": "1d7e2f6fb8", "date_fixed": "2026-06-01T07:32:14Z", "source": "pr", "needs_review": false, "audit_count": 5}, {"bug_id": "BUG-2026-018", "title": "[NPU] fix model llava-onevision-qwen2-7b-ov torch compiles error in npu case", "category": "crash", "severity": 10, "confidence": 0.95, "root_cause": "torch.compile graph execution fails on NPU backend for apply_scaling_penalties due to incompatible ops or graph breaks; fix disables torch.compile entirely on NPU", "rationale": "This is a platform compatibility issue: torch.compile's NPU backend cannot compile the apply_scaling_penalties function. The program terminates as a symptom of this incompatibility, but the root cause is a missing/immature NPU compile path, not a logic bug. Reclassified from crash to compatibility per classification rules (crash=program terminates due to logic bugs; compatibility=platform adaptation). Severity 3: prevents a specific model (LLaVA-OneVision) from running on NPU.", "pr_number": 26573, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/26573", "pr_body": "\r\n<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\nWhen the model `lmms-lab/llava-onevision-qwen2-7b-ov` is launched in the NPU case, a graph execution error caused by `@torch.compile` occurring in funtion `apply_scaling_penalties ": 10, "confidence": 0.9, "root_cause": "Direct assignment (=) in DeepseekV2ForCausalLM.__init__ overwrites pre-populated quant_config.packed_modules_mapping dict (with nested structure including 'model' key), replacing it with a flat dict, causing ModelSlim's get('model', {}) to return empty dict and triggering NoneType crash in create_weights", "rationale": "FP8 quant config silently loses the packed_modules_mapping when merging fused shards, leading to wrong quantization setup. An oracle test comparing quantized model behavior with/without the mapping preserved would catch it.", "pr_number": 25755, "pr_url": "https://api.github.com/repos/sgl-project/sglang/pulls/25755", "pr_body": "<!-- Thank you for your contribution! Please follow these guidelines to enhance your pull request. If anything is unclear, submit your PR and reach out to maintainers for assistance. Join our Slack community at https://slack.sglang.io to discuss further. -->\r\n\r\n## Motivation\r\n\r\n<!-- Describe the purpose and goals of this pull request. -->\r\n\r\nCommit abe2ec2af introduced a direct assignment in `DeepseekV2ForCausalLM.__init__` that overwrites `quant_config.packed_modules_mapping`. Before the overwrite, the dict (pre-populated by the weight loader for ModelSlim) has a nested structure:\r\n\r\n```python\r\n{\r\n    \"visual\": {...},\r\n    \"vision_model\": {...},\r\n    \"model\": {\"fused_qkv_a_proj_with_mqa\": [\"q_a_proj\", \"kv_a_proj_with_mqa\"], ...},\r\n}\r\n```\r\n\r\nAfter the overwrite, it is replaced with the model's flat dict:\r\n\r\n```python\r\n{\"fused_qkv_a_proj_with_mqa\": [\"q_a_proj\", \"kv_a_proj_with_mqa\"]}\r\n```\r\n\r\nModelSlim accesses this dict via `self.packed_modules_mapping.get(\"model\", {})`, which now returns `{}`, causing `get_linear_scheme` to return `None` and triggering `AttributeError: 'NoneType' object has no attribute 'create_weights'`.\r\n\r\n## Modifications\r\n\r\n<!-- Detail the changes made in this pull request. -->\r\n\r\nReplace d   });
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function applyFilters(){
  var filtered=getFiltered();
  var tbody=document.getElementById('tableBody');
  var noRes=document.getElementById('noResults');
  var count=document.getElementById('resultCount');
  count.textContent=filtered.length+' result'+(filtered.length!==1?'s':'');
  if(filtered.length===0){tbody.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';

  var rows=[];
  for(var i=0;i<filtered.length;i++){
    var d=filtered[i];
    var sevColor=SEV_COLORS[d.severity]||'#6b7280';
    var confLevel=d.confidence>=0.9?'high':d.confidence>=0.7?'med':'low';
    var confColor=confLevel==='high'?'#22c55e':confLevel==='med'?'#f59e0b':'#ef4444';
    var catName=CAT_NAMES[d.category]||d.category;
    var prLink=d.pr_url||(d.pr_number?'https://github.com/sgl-project/sglang/pull/'+d.pr_number:'');
    var title=d.title||'(no title)';
    var rc=d.root_cause||'';if(rc.length>100)rc=rc.substring(0,100)+'...';
    var rf=d.needs_review?' <span class="review-flag">REVIEW</span>':'';
    var pn=d.pr_number?'<a href="'+prLink+'" target="_blank" class="pr-link">#'+d.pr_number+'</a>':'';
    var sevLevel=d.severity===10?3:d.severity===3?2:1;var sevDots='<span style="color:'+sevColor+';font-size:14px;font-weight:700">'+'●'.repeat(sevLevel)+'</span><span style="color:var(--text2);opacity:0.2">'+'●'.repeat(3-sevLevel)+'</span> <span style="font-size:10px;color:var(--text2)">'+SEV_NAMES[d.severity]+'</span>';
    var filesHtml=(d.files_fixed||[]).map(function(f){return '<span>'+esc(f)+'</span>';}).join('');
    var labelsHtml=(d.pr_labels||[]).map(function(l){return '<span class="label-tag">'+esc(l)+'</span>';}).join(' ');
    var bodyHtml=d.pr_body?'<div class="pr-body-section"><div class="dt">PR Body</div><div class="dd">'+esc(d.pr_body)+'</div></div>':'';
    var ghLink=prLink?'<div style="margin-top:8px"><a href="'+prLink+'" target="_blank" style="color:var(--accent);font-size:12px">View PR #'+d.pr_number+' on GitHub →</a></div>':'';

    rows.push(
      '<tr>'+
        '<td><span class="id-link">'+d.bug_id+'</span>'+rf+'<div style="margin-top:1px">'+pn+'</div></td>'+
        '<td><span class="cat-badge cat-'+d.category+'">'+catName+'</span></td>'+
        '<td>'+sevDots+'</td>'+
        '<td class="conf-cell"><span class="conf-dot" style="background:'+confColor+'"></span><span style="color:'+confColor+'">'+(d.confidence*100).toFixed(0)+'%</span></td>'+
        '<td><div class="title-cell" title="'+esc(title)+'">'+esc(title)+'</div></td>'+
        '<td><div class="root-cause-cell" title="'+esc(d.root_cause||'')+'">'+esc(rc)+'</div></td>'+
        '<td><button class="expand-btn" data-idx="'+i+'">+</button></td>'+
      '</tr>'+
      '<tr class="detail-row" id="detail-'+i+'"><td colspan="7">'+
        '<div class="detail-grid">'+
          '<div><div class="dl"><div class="dt">Root Cause</div><div class="dd">'+esc(d.root_cause||'(none)')+'</div></div></div>'+
          '<div><div class="dl"><div class="dt">Rationale</div><div class="dd">'+esc(d.rationale||'(none)')+'</div></div></div>'+
          '<div><div class="dl"><div class="dt">Files Fixed ('+(d.files_fixed||[]).length+')</div><div class="dd files">'+filesHtml+'</div></div></div>'+
          '<div><div class="dl"><div class="dt">Labels</div><div class="dd">'+labelsHtml+'</div></div></div>'+
          '<div><div class="dl"><div class="dt">Commit</div><div class="dd" style="font-family:monospace;font-size:12px">'+(d.commit_sha||'N/A')+'</div></div></div>'+
          '<div><div class="dl"><div class="dt">Date Fixed</div><div class="dd" style="font-size:12px">'+(d.date_fixed||'N/A')+'</div></div></div>'+
          '<div><div class="dl"><div class="dt">Source</div><div class="dd" style="font-size:12px">'+(d.source||'N/A')+'</div></div></div>'+
          '<div><div class="dl"><div class="dt">Audit Count</div><div class="dd" style="font-size:12px">'+(d.audit_count||0)+'</div></div></div>'+
        '</div>'+bodyHtml+ghLink+
      '</td></tr>'
    );
  }
  tbody.innerHTML=rows.join('');

  document.querySelectorAll('th').forEach(function(th){
    var m=(th.getAttribute('onclick')||'').match(/'(\w+)'/);
    var f=m?m[1]:'', arrow=th.querySelector('.sort-arrow');
    if(arrow)arrow.textContent=f===sortField?(sortAsc?'▲':'▼'):'';
  });

  document.querySelectorAll('.expand-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var idx=parseInt(this.getAttribute('data-idx'));
      var row=document.getElementById('detail-'+idx);
      if(!row)return;
      if(expandedRows.has(idx)){expandedRows.delete(idx);row.classList.remove('show');this.textContent='+';}
      else{expandedRows.add(idx);row.classList.add('show');this.textContent='−';}
    });
  });
}

function sortTable(field){if(sortField===field)sortAsc=!sortAsc;else{sortField=field;sortAsc=true;}expandedRows.clear();applyFilters();}
function resetFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('catFilter').value='';
  document.getElementById('sevFilter').value='';
  document.getElementById('confFilter').value='';
  document.getElementById('labelFilter').value='';
  document.getElementById('reviewFilter').value='';
  expandedRows.clear();sortField='bug_id';sortAsc=true;applyFilters();
}
document.addEventListener('keydown',function(e){
  if(e.key==='/'&&document.activeElement!==document.getElementById('searchInput')){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.key==='Escape'){document.getElementById('searchInput').blur();resetFilters();}
});

renderStats();renderCharts();applyFilters();
</script>
</body>
</html>
