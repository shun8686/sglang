      - single-node-tests
      - multi-node-tests
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check job status
        run: |
          FAILED=0
          echo "=== Check non-skipped jobs ==="
          ${{ contains(needs.*.result, 'failure') }} && FAILED=1
          ${{ contains(needs.*.result, 'cancelled') }} && FAILED=1
          if [ $FAILED -eq 1 ]; then
            echo "❌ Some jobs failed or cancelled"
            exit 1
          fi
          echo "✅ All selected scope jobs passed"