name: nightly-test-npu-perf-a3

on:
  pull_request:
    branches:
      - main
      - testcases
    paths:
      - ".github/workflows/nightly-test-npu-perf-a3.yml"
  workflow_dispatch:

concurrency:
  group: npu-nightly-test-${{ github.ref }}-a3
  cancel-in-progress: true

jobs:
  nightly-performance-baseline-single-node-tests-bugfix:
    name: single-node
    if: ${{ (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') && false }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        test_config:
          - name: test_ascend_qwen3_vl_30b_bf16_2p_in1024x1024_out1024_50ms
            test_case: test/registered/ascend/performance/v26/test_ascend_qwen3_vl_30b_bf16_2p_in1024x1024_out1024_50ms.py
            runner: linux-aarch64-a3-4
    uses: ./.github/workflows/nightly-test-npu-perf-single-node.yml
    with:
      runner: ${{ matrix.test_config.runner }}
      test_config_name: ${{ matrix.test_config.name }}
      test_case: ${{ matrix.test_config.test_case }}
      image: 'swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:cann8.5.0-a3-B121'
      install_sglang_from_source: false
      transformers_version: ''

