name: Release Test (NPU)

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/release-test-npu.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to test. If not provided, uses the default branch.'
        required: false
        type: string
        default: ''
      job_filter:
        description: 'Select which job to run (leave empty or "all" to run all jobs)'
        required: false
        type: string
        default: 'all'
      image:
        description: 'The running docker image of the test task.'
        required: false
        type: string
        default: 'swr.cn-southwest-2.myhuaweicloud.com/dockerhub/lmsysorg/sglang:main-cann8.5.0-a3'
      daily_image_flag:
        description: 'Identifies whether the test target is a daily build image package, defaulting to false.'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-test-npu-${{ inputs.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  call-nighly-test-npu:
    name: nightly-test-npu
    if: ${{ (github.repository == 'sgl-project/sglang' || github.event_name == 'pull_request') }}
    uses: ./.github/workflows/nightly-test-npu.yml
    with:
      ref:  ''
      job_filter: 'all'
      image: 'swr.cn-southwest-2.myhuaweicloud.com/dockerhub/lmsysorg/sglang:main-cann8.5.0-a3'
      is_daily_image: true
    secrets: inherit

